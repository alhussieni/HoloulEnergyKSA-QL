<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة عروض أسعار محطات الطاقة الشمسية | حلول الطاقة المتجددة والمقاولات - HoloulEnergy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#122436;
  --night:#0D3452;
  --night-2:#155E85;
  --teal:#0FA98D;
  --teal-dark:#0B7A66;
  --teal-tint:#E7F8F4;
  --sun:#E7AC12;
  --sun-2:#F3CB56;
  --sun-tint:#FCF3DE;
  --sand:#F6F8F7;
  --card:#FFFFFF;
  --line:#DEE7E4;
  --muted:#63736F;
  --good:#0FA98D;
  --bad:#B0432C;
  --shadow:0 1px 3px rgba(13,52,82,.07), 0 1px 2px rgba(13,52,82,.05);
  --radius:14px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--sand);color:var(--ink);font-family:'Cairo',sans-serif;}
h1,h2,h3,.disp{font-family:'Cairo',sans-serif;}
.num{font-family:'Cairo',sans-serif;font-variant-numeric:tabular-nums;font-weight:600;}

/* header */
header.top{background:#FFFFFF;color:var(--ink);padding:18px 28px;position:relative;overflow:hidden;border-bottom:1px solid var(--line);box-shadow:0 1px 3px rgba(13,52,82,.05);}
header.top::before{content:"";position:absolute;left:-60px;top:-90px;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,var(--sun-tint),transparent 70%);opacity:.9;}
header.top::after{content:"";position:absolute;right:-40px;bottom:-90px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle at 60% 40%,var(--teal-tint),transparent 70%);opacity:.8;}
.brandrow{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2;flex-wrap:wrap;gap:14px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand .mark{width:46px;height:46px;border-radius:11px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;padding:4px;box-shadow:var(--shadow);}
.brand .mark img{width:100%;height:100%;object-fit:contain;}
.brand .name{font-family:'Cairo',sans-serif;font-weight:800;font-size:20px;color:var(--night);}
.brand .sub{font-size:12px;color:var(--muted);margin-top:2px;}
nav.tabs{display:flex;gap:6px;background:var(--sand);padding:5px;border-radius:12px;border:1px solid var(--line);}
nav.tabs button{background:transparent;border:0;color:var(--ink);padding:9px 16px;border-radius:9px;font-family:'Cairo',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:.15s;}
nav.tabs button.active{background:var(--sun);color:var(--night);}
nav.tabs button:not(.active):hover{background:#fff;}

main{max-width:1280px;margin:0 auto;padding:26px 20px 70px;}
section.view{display:none;}
section.view.active{display:block;}

.grid2{display:grid;grid-template-columns:380px 1fr;gap:22px;align-items:start;}
@media (max-width:960px){.grid2{grid-template-columns:1fr;}}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:18px;box-shadow:var(--shadow);}
.card h3{margin:0 0 14px;font-size:16px;display:flex;align-items:center;gap:9px;}
.card h3::before{content:"";width:4px;height:16px;border-radius:3px;background:linear-gradient(180deg,var(--teal),var(--sun));display:inline-block;}
.card h3 .tag{font-size:11px;background:var(--sand);border:1px solid var(--line);color:var(--muted);padding:2px 8px;border-radius:20px;font-family:'Cairo';font-weight:500;}

label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;font-weight:500;}
label:first-child{margin-top:0;}
input[type=text],input[type=number],select{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;
  font-family:'Cairo';background:#fff;color:var(--ink);transition:border-color .15s,box-shadow .15s;
}
input[type=number]{font-family:'Cairo';}
input:focus,select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.seg button{flex:1;padding:9px;border:0;background:#fff;cursor:pointer;font-family:'Cairo';font-weight:600;font-size:13px;color:var(--muted);}
.seg button.active{background:var(--night);color:#fff;}

.toggles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
.tgl{display:flex;align-items:center;gap:8px;background:var(--sand);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12.5px;cursor:pointer;user-select:none;transition:background .15s,border-color .15s;}
.tgl:has(input:checked){background:var(--teal-tint);border-color:var(--teal);}
.tgl input{margin:0;accent-color:var(--teal);}

details.adv{margin-top:14px;border-top:1px dashed var(--line);padding-top:10px;}
details.adv summary{cursor:pointer;font-size:13px;color:var(--night-2);font-weight:600;}

/* results */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:4px;}
.stat{background:var(--sand);border:1px solid var(--line);border-inline-end:3px solid var(--teal);border-radius:11px;padding:12px 14px;}
.stat .v{font-family:'Cairo';font-size:19px;font-weight:600;color:var(--night);}
.stat .l{font-size:11.5px;color:var(--muted);margin-top:3px;}

table.bom{width:100%;border-collapse:collapse;font-size:13px;}
table.bom th{text-align:right;color:var(--muted);font-weight:600;font-size:11.5px;padding:8px 8px;border-bottom:2px solid var(--night);}
table.bom td{padding:9px 8px;border-bottom:1px solid #EFEBE0;}
table.bom tr.off td{opacity:.35;}
table.bom tr:hover td{background:var(--sand);}
table.bom td.num,table.bom th.num{font-family:'Cairo';text-align:left;}

.totalbar{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(120deg,var(--night) 0%,var(--night-2) 85%,#1A6A87 100%);color:#fff;border-radius:12px;padding:16px 20px;margin-top:14px;flex-wrap:wrap;gap:10px;}
.totalbar .big{font-family:'Cairo',sans-serif;font-weight:800;font-size:26px;color:var(--sun-2);}
.totalbar .lbl{font-size:12px;color:#BFE3D6;}

.pay3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.pay3 div{background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center;}
.pay3 .p{font-family:'Cairo';font-weight:600;font-size:17px;color:var(--night);}
.pay3 .l{font-size:11px;color:var(--muted);margin-top:3px;}

.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--sun-2),var(--sun));color:var(--night);border:0;padding:11px 18px;border-radius:10px;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 2px 6px rgba(231,172,18,.3);transition:transform .1s,box-shadow .15s;}
.btn:hover{box-shadow:0 3px 10px rgba(231,172,18,.4);transform:translateY(-1px);}
.btn.ghost{background:transparent;border:1px solid var(--teal);color:var(--teal-dark);box-shadow:none;}
.btn.ghost:hover{background:var(--teal-tint);transform:none;}
.btn.small{padding:7px 12px;font-size:12.5px;}
.btn.danger{background:#F4E4E0;color:var(--bad);box-shadow:none;}

.note{font-size:12px;color:var(--muted);line-height:1.7;background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}

/* admin */
.admtable{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px;}
.admtable th{font-size:11px;color:var(--muted);text-align:right;padding:6px;}
.admtable td{padding:5px;}
.admtable input{padding:6px 8px;font-size:12.5px;}
.admtable td.op{width:34px;text-align:center;}

.assump{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}

svg.chart{width:100%;height:260px;}
footer.foot{text-align:center;color:var(--muted);font-size:12px;padding:24px;}

@page{ size:A4; margin:11mm; }
@media print{
  header.top,.no-print,footer.foot{display:none!important;}
  body{background:#fff;font-size:11.5px;}
  main{padding:0!important;max-width:100%!important;}
  .grid2{grid-template-columns:1fr!important;gap:6px!important;display:block!important;}
  .card{border:1px solid #ddd!important;box-shadow:none!important;padding:9px 12px!important;margin-bottom:7px!important;border-radius:8px!important;page-break-inside:avoid;}
  .card h3{font-size:12.5px!important;margin:0 0 7px!important;}
  .card h3 .tag{display:none!important;}
  .quote-banner{padding:8px 12px!important;}
  #bannerName{font-size:13px!important;}
  #bannerPhone{font-size:10.5px!important;}
  .stats{grid-template-columns:repeat(6,1fr)!important;gap:5px!important;}
  .stat{padding:5px 6px!important;background:#F7F8F7!important;}
  .stat .v{font-size:12px!important;}
  .stat .l{font-size:8px!important;}
  table.bom{font-size:9.5px!important;}
  table.bom th{font-size:8.5px!important;padding:3px 4px!important;}
  table.bom td{padding:3px 4px!important;}
  .totalbar{padding:8px 12px!important;margin-top:6px!important;border-radius:8px!important;}
  .totalbar .big{font-size:17px!important;}
  .totalbar .lbl{font-size:9.5px!important;}
  .pay3{margin-top:6px!important;gap:5px!important;}
  .pay3 div{padding:5px!important;}
  .pay3 .p{font-size:10.5px!important;}
  .pay3 .l{font-size:7.5px!important;}
  .note{font-size:9px!important;padding:6px 8px!important;}
}
/* Mirrors the @media print block above exactly (same values), so the
   PDF generated for WhatsApp sharing (downloadQuotePdf) looks identical
   to what comes out of the browser's own Print/Save-as-PDF. Applied via
   JS by adding the "pdf-compact" class to the cloned print area before
   capture — kept in sync manually with @media print above. */
.pdf-compact{font-size:11.5px;}
.pdf-compact .grid2{grid-template-columns:1fr!important;gap:6px!important;display:block!important;}
.pdf-compact .card{border:1px solid #ddd!important;box-shadow:none!important;padding:9px 12px!important;margin-bottom:7px!important;border-radius:8px!important;page-break-inside:avoid;}
.pdf-compact .card h3{font-size:12.5px!important;margin:0 0 7px!important;}
.pdf-compact .card h3 .tag{display:none!important;}
.pdf-compact .quote-banner{padding:8px 12px!important;}
.pdf-compact #bannerName{font-size:13px!important;}
.pdf-compact #bannerPhone{font-size:10.5px!important;}
.pdf-compact .stats{grid-template-columns:repeat(6,1fr)!important;gap:5px!important;}
.pdf-compact .stat{padding:5px 6px!important;background:#F7F8F7!important;}
.pdf-compact .stat .v{font-size:12px!important;}
.pdf-compact .stat .l{font-size:8px!important;}
.pdf-compact table.bom{font-size:9.5px!important;}
.pdf-compact table.bom th{font-size:8.5px!important;padding:3px 4px!important;}
.pdf-compact table.bom td{padding:3px 4px!important;}
.pdf-compact .totalbar{padding:8px 12px!important;margin-top:6px!important;border-radius:8px!important;}
.pdf-compact .totalbar .big{font-size:17px!important;}
.pdf-compact .totalbar .lbl{font-size:9.5px!important;}
.pdf-compact .pay3{margin-top:6px!important;gap:5px!important;}
.pdf-compact .pay3 div{padding:5px!important;}
.pdf-compact .pay3 .p{font-size:10.5px!important;}
.pdf-compact .pay3 .l{font-size:7.5px!important;}
.pdf-compact .note{font-size:9px!important;padding:6px 8px!important;}
</style>
</head>

function deepMerge(base, over){
  for(const k in over){
    if(Array.isArray(over[k])) base[k]=over[k];
    else if(over[k] && typeof over[k]==='object') base[k]=deepMerge(base[k]||{}, over[k]);
    else base[k]=over[k];
  }
  return base;
}

function pickLadder(ladder, value){ for(const v of ladder) if(value<=v) return v; return ladder[ladder.length-1]; }
function pickInverter(kwNeeded, list){ for(const row of list) if(kwNeeded<=row[0]) return row; return list[list.length-1]; }
function pickCombiner(minInputs, boxes, headroom){
  const need = minInputs*headroom;
  for(const row of boxes) if(need<=row[0]) return row;
  return boxes[boxes.length-1];
}

function computeQuote(inp){
  const D = DB, panel = inp.panel, hp = inp.hp;

  const panelsPerString = Math.floor(D.maxStringVoltage/panel.vimp) - (inp.panelsPerStringAdjust ?? D.panelsPerStringAdjust);
  const arrays = Math.round(hp*1000*1.1/(panelsPerString*panel.power)) - (inp.stringsAdjust ?? D.stringsAdjust);
  const totalPanels = panelsPerString*arrays;
  const calcKW = panel.power*totalPanels/1000;
  const efficiencyRatio = calcKW/hp;

  const Iimp = arrays*panel.iimp;
  const Vimp = panelsPerString*panel.vimp;
  const Voc  = panelsPerString*panel.voc;
  const Isc  = arrays*panel.isc;
  const IscCalc = Isc*1.25;
  const expectedVAC = Vimp*0.88/Math.SQRT2;

  const inverterCalcKW = Math.ceil(hp*0.8) + (inp.inverterPowerIncrease ?? D.inverterPowerIncrease);
  const inv = pickInverter(inverterCalcKW, D.inverters);
  const invKW=inv[0], invCost=inv[1], invList=inv[2];

  const reactorModel = pickLadder(D.reactorLadder, Iimp);
  const reactorPrice = D.reactorPrices[reactorModel];
  const cbSize = pickLadder(D.cbLadder, IscCalc);
  const combiner = inp.combinerOverride || pickCombiner(arrays, D.combinerBoxes, D.combinerHeadroom);

  const panelCost = panel.priceW*calcKW*1000;
  const steelPanelCost = D.steelPanelPerHP*hp;
  const combinerCost = combiner[1];

  const cableRaw = calcKW>=100 ? 70*arrays : 45*arrays;
  const roundedHundreds = Math.round(cableRaw/100)*100;
  const hundredsUnit = roundedHundreds/100;
  const evenUnit = (hundredsUnit%2===0) ? hundredsUnit : (hundredsUnit>0?hundredsUnit+1:hundredsUnit-1);
  const cablesLen = evenUnit*100;
  const cablesCost = cablesLen*D.cablePerMeter;

  const mc4Cost = arrays*D.mc4PerUnit;
  const structurePrice = inp.structureType==='ROTATIONAL' ? D.structurePriceRotational : D.structurePriceFixed;
  const structureCost = arrays*structurePrice;
  const concreteQty = Math.round(arrays*8/3.5);
  const concreteCost = concreteQty*D.concretePerUnit;
  const earthQty = Math.round(calcKW/40);
  const earthCost = earthQty*D.earthingPerUnit;
  const reactorCost = reactorPrice;
  const flexQty = Math.round(cablesLen/40);
  const flexCost = flexQty*D.flexTubePerUnit;
  const installQty = calcKW;
  const installCost = installQty*D.installationPerKW;
  const transportQty = Math.ceil(calcKW/20);
  const transportCost = transportQty*D.transportPerTrip;

  const t = inp.toggles;
  const items = [];
  const push=(key,label,on,sell,costBasis,meta={})=>items.push({key,label,on,sell:on?sell:0,costBasis,
      type: meta.type||'-', qty: on?(meta.qty||'-'):'لا يوجد', warranty: on?(meta.warranty||'-'):'لا يوجد'});

  push('panel','ألواح الطاقة الشمسية', t.panel, panelCost, panelCost, {
    type:`${panel.brand} ${panel.power}W أو ما يعادلها`, qty:`#${totalPanels}#`,
    warranty:'12 سنة ضد عيوب الصناعة / 30 سنة ضد التناقص الإنتاجي عن %80'});
  push('inverter','الانفرتر', t.inverter, invList, invCost, {
    type:`VEICHI أو ما يعادلها ${invKW} KW`, qty:'#1#', warranty:'سنة واحدة'});
  push('ip65','لوحة الحماية IP65', t.ip65, steelPanelCost*1.25, steelPanelCost, {
    type:`خاصة بانفرتر ${invKW} KW`, qty:'#1#', warranty:'سنة واحدة'});
  push('combiner',`VEICHI Combiner box ${String(combiner[0]).padStart(3,'0')}`, t.combiner, combinerCost*1.3, combinerCost, {
    type:'-', qty:'#1#', warranty:'سنة واحدة'});
  push('cables','الكابلات - DC', t.cables, cablesCost*1.5, cablesCost, {
    type:'VEICHI / LEADER / SUNTREE 6mm', qty:`${cablesLen} متر (تقريبي — يُحدد نهائيًا عند التوريد)`, warranty:'سنة واحدة'});
  push('mc4','وصلات MC4', t.mc4, mc4Cost*1.5, mc4Cost, {
    type:'Suntree / VEICHI / LEADER', qty:`#${arrays}#`, warranty:'---'});
  push('structure','الشاسيه/الحوامل ('+(inp.structureType==='ROTATIONAL'?'متحرك':'ثابت')+')', t.structure, structureCost*1.1, structureCost, {
    type:'HDG - تصنيع محلي', qty:`#${arrays}#`, warranty:'عشر سنوات'});
  push('concrete','الخرسانة', t.concrete, concreteCost*1.1, concreteCost, {
    type:'مصبوبة في الموقع', qty:'مطابق للمخطط', warranty:'---'});
  push('earth','التأريض (بئر أرضي)', t.earth, earthCost, earthCost, {
    type:'-', qty:`#${earthQty}#`, warranty:'سنة واحدة'});
  push('reactor','الريأكتور', t.reactor, reactorCost, reactorCost, {
    type:`${reactorModel}A`, qty:'#1#', warranty:'سنة واحدة'});

  const installSell = t.installation ? (inp.structureType==='FIXED' ? 150*Math.round(calcKW) : 2000*Math.round(calcKW)) : 0;
  const installCostBasis = steelPanelCost + installCost + (t.supply?transportCost:0);
  push('install','التوريد والنقل والتركيب والعمالة', t.installation, installSell, installCostBasis, {
    type:'-', qty:`${calcKW.toFixed(1)} KW`, warranty:'عام واحد فقط من تاريخ التشغيل'});

  const factor = inp.discountFactor;
  let sellTotal=0, discountTotal=0;
  for(const it of items){
    if(!it.on){ it.discount=0; it.net=0; continue; }
    const margin = it.sell - it.costBasis;
    const discount = it.key==='panel' ? 0 : margin*factor;
    it.discount = discount;
    it.net = it.sell - discount;
    sellTotal += it.sell;
    discountTotal += discount;
  }
  discountTotal = Math.round(discountTotal/10)*10;
  const netAfterDiscount = sellTotal - discountTotal;
  const manualDiscountAmt = netAfterDiscount*(inp.manualDiscountPct||0)/100;
  const netAfterManual = netAfterDiscount - manualDiscountAmt;
  const vat = netAfterManual*D.vat;
  const finalTotal = netAfterManual + vat;

  return {
    panelsPerString, arrays, totalPanels, calcKW, efficiencyRatio,
    Iimp, Vimp, Voc, Isc, IscCalc, expectedVAC,
    inverterCalcKW, invKW, invCost, invList,
    reactorModel, reactorPrice, cbSize, combiner,
    items, sellTotal, discountTotal, netAfterDiscount, manualDiscountAmt,
    netAfterManual, vat, finalTotal, sarPerKW: finalTotal/calcKW
  };
}

/* IRR via bisection on a cash-flow array where cf[0] is the year-0 outlay */
function irr(cf){
  function npv(r){ return cf.reduce((s,c,i)=>s + c/Math.pow(1+r,i), 0); }
  let lo=-0.9, hi=5, mid;
  if(npv(lo)*npv(hi) > 0) return null;
  for(let i=0;i<100;i++){
    mid=(lo+hi)/2;
    if(npv(lo)*npv(mid) <= 0) hi=mid; else lo=mid;
  }
  return mid;
}

function computeFeasibility(capex, calcKW, opt){
  const f = {...DB.feas, ...opt};
  const baseGen = calcKW*f.psh*365;
  const years = f.years;
  const genArr=[], gridArr=[], dieselArr=[];
  let cumGrid=-capex, cumDiesel=-capex, paybackGrid=null, paybackDiesel=null;
  const cfGrid=[-capex], cfDiesel=[-capex];
  const omYear = capex*f.solarOMPctOfCapex/100;
  for(let y=1;y<=years;y++){
    const gen = baseGen*Math.pow(1-f.panelDegradationPct/100, y-1);
    const gridVal = gen*f.gridPrice*Math.pow(1+f.gridEscalationPct/100, y-1);
    const dieselVal = gen*f.dieselConsumptionPerKWh*f.dieselPrice*Math.pow(1+f.dieselEscalationPct/100, y-1);
    const om = y===1?0:omYear;
    const netGrid = gridVal-om, netDiesel = dieselVal-om;
    genArr.push(gen); gridArr.push(netGrid); dieselArr.push(netDiesel);
    cfGrid.push(netGrid); cfDiesel.push(netDiesel);
    cumGrid+=netGrid; cumDiesel+=netDiesel;
    if(paybackGrid===null && cumGrid>=0) paybackGrid = y-1 + (netGrid-cumGrid)/netGrid;
    if(paybackDiesel===null && cumDiesel>=0) paybackDiesel = y-1 + (netDiesel-cumDiesel)/netDiesel;
  }
  const litersYear1 = genArr[0]*f.dieselConsumptionPerKWh;
  const co2Year1 = litersYear1*f.co2FactorKgPerLiter/1000;
  return {
    genArr, gridArr, dieselArr,
    paybackGrid, paybackDiesel,
    irrGrid: irr(cfGrid), irrDiesel: irr(cfDiesel),
    profit30Grid: cfGrid.reduce((a,b)=>a+b,0),
    profit30Diesel: cfDiesel.reduce((a,b)=>a+b,0),
    litersYear1, co2Year1, cfGrid, cfDiesel
  };
}

// html2pdf.js clones the element AGAIN internally before rendering it
// (a documented bug in the library). That second, detached clone can fail
// to resolve CSS custom properties (var(--ink), var(--card), var(--line)...)
// which this app uses everywhere for colors — the result would be borders
// showing up while all text/fills come out white/blank. To avoid this
// entirely, and to avoid the internal re-clone breaking Arabic RTL/bidi
// text (fused words, scrambled digits), we bypass html2pdf.js and use
// html2canvas + jsPDF directly on our OWN clone, which stays attached to
// the live document (correct dir="rtl", fonts, styles) the whole time.

// "Flatten" every resolved color onto the clone as a literal inline style
// (e.g. color:rgb(21,42,56)) BEFORE capture, so there is no var() left
// that anything could fail to resolve.
const FLATTEN_PROPS = [
  'color','backgroundColor',
  'borderTopColor','borderRightColor','borderBottomColor','borderLeftColor'
];
function flattenComputedColors(liveRoot, cloneRoot){
  const liveEls = [liveRoot, ...liveRoot.querySelectorAll('*')];
  const cloneEls = [cloneRoot, ...cloneRoot.querySelectorAll('*')];
  liveEls.forEach((liveEl, i)=>{
    const cloneEl = cloneEls[i];
    if(!cloneEl) return;
    const cs = getComputedStyle(liveEl);
    FLATTEN_PROPS.forEach(prop=>{ cloneEl.style[prop] = cs[prop]; });
  });
}

// Picks a safe html2canvas scale per device. Mobile/tablet browsers
// (especially iOS Safari and in-app webviews like WhatsApp) silently
// return a BLANK canvas when the rendered pixel area is too large, so we
// cap the scale more conservatively there than on desktop/laptop.
function getCaptureScale(){
  const ua = navigator.userAgent || '';
  const isTablet = /iPad|Tablet/i.test(ua) || (/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1);
  const isMobile = /iPhone|iPod|Android/i.test(ua) && !isTablet;
  const dpr = window.devicePixelRatio || 1;
  if(isMobile) return Math.max(1, Math.min(dpr, 1.5));
  if(isTablet) return Math.max(1, Math.min(dpr, 1.75));
  return Math.max(1, Math.min(dpr, 2)) || 2;
}

async function downloadQuotePdf(filename){
  const src = document.getElementById('quotePrintArea');
  if(!src || typeof html2canvas==='undefined') return false;
  const clone = src.cloneNode(true);

  // Flatten colors BEFORE removing .no-print nodes, so the live/clone
  // element lists still line up 1:1 in the same order.
  flattenComputedColors(src, clone);
  clone.querySelectorAll('.no-print').forEach(el=>el.remove());
  // Use the exact same compact layout/typography as the browser's own
  // Print/Save-as-PDF (@media print), so both outputs look identical.
  clone.classList.add('pdf-compact');

  const CAPTURE_WIDTH = 760;
  clone.style.maxWidth = CAPTURE_WIDTH+'px';
  clone.style.width = CAPTURE_WIDTH+'px';
  clone.style.backgroundColor = '#ffffff';
  // Force the correct text direction/language explicitly on the clone
  // itself, since it's what keeps Arabic word-joining and bidi digit
  // order correct.
  clone.setAttribute('dir','rtl');
  clone.setAttribute('lang','ar');

  // IMPORTANT: keep the clone inside the viewport's coordinate space
  // (top:0; left:0) instead of pushing it far off-screen (e.g. left:-9999px).
  // Many mobile/tablet browsers (iOS Safari, Chrome/WhatsApp webviews) skip
  // painting fixed-position content placed outside the visible viewport
  // bounds, which produces a fully white/blank PDF. Using a very low
  // z-index keeps it invisible behind the real page instead.
  const wrapper = document.createElement('div');
  wrapper.setAttribute('dir','rtl');
  wrapper.style.cssText = [
    'position:fixed',
    'top:0',
    'left:0',
    'z-index:-9999',
    'pointer-events:none',
    'background:#fff',
    'padding:14px',
    `width:${CAPTURE_WIDTH+28}px`,
    'overflow:visible'
  ].join(';');
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  // Give mobile browsers a couple of frames to actually lay out and paint
  // the clone before html2canvas snapshots it (fixes intermittent blanks
  // on phones/tablets where layout isn't ready on the very next tick).
  await new Promise(resolve=>requestAnimationFrame(()=>requestAnimationFrame(resolve)));

  try{
    const canvas = await html2canvas(clone, {
      scale: getCaptureScale(),
      useCORS: true,
      backgroundColor: '#ffffff',
      windowWidth: CAPTURE_WIDTH+28,
      windowHeight: Math.max(wrapper.scrollHeight, clone.scrollHeight)
    });

    const JsPdfCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
    if(!JsPdfCtor) throw new Error('jsPDF not available');

    // Build the PDF ourselves so we can force everything onto ONE A4 page
    // (shrink-to-fit) instead of letting content spill onto a second page.
    const pdf = new JsPdfCtor({unit:'mm', format:'a4', orientation:'portrait'});
    const pageW = 210, pageH = 297, margin = 8;
    const usableW = pageW - margin*2, usableH = pageH - margin*2;
    // PNG (lossless) instead of JPEG: avoids compression artifacts around
    // small text/numbers in the pricing table, which is what matters most
    // here — a client must be able to read every figure without ambiguity.
    const imgData = canvas.toDataURL('image/png');
    const imgRatio = canvas.height / canvas.width;

    let drawW = usableW;
    let drawH = drawW * imgRatio;
    if(drawH > usableH){
      // Content is taller than one page at full width — shrink further so
      // the whole thing still fits within a single A4 page.
      drawH = usableH;
      drawW = drawH / imgRatio;
    }
    const x = margin + (usableW - drawW)/2;
    const y = margin + (usableH - drawH)/2;

    pdf.addImage(imgData, 'PNG', x, y, drawW, drawH);
    pdf.save(filename);
    return true;
  }catch(err){
    console.error('PDF generation failed', err);
    return false;
  }finally{
    document.body.removeChild(wrapper);
  }
}

function buildChart(cfGrid, cfDiesel){
  const cumG=[], cumD=[]; let cg=0, cd=0;
  cfGrid.forEach(v=>{cg+=v; cumG.push(cg);});
  cfDiesel.forEach(v=>{cd+=v; cumD.push(cd);});
  const W=900,H=240,pad=36;
  const allVals=[...cumG,...cumD];
  const maxV=Math.max(...allVals), minV=Math.min(...allVals,0);
  const n=cumG.length;
  const x=i=>pad+(W-2*pad)*i/(n-1);
  const y=v=>H-pad-(H-2*pad)*(v-minV)/(maxV-minV||1);
  const path=arr=>arr.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const zeroY=y(0);
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${pad}" y1="${zeroY}" x2="${W-pad}" y2="${zeroY}" stroke="#C9C4B4" stroke-width="1" stroke-dasharray="4 4"/>
    <path d="${path(cumD)}" fill="none" stroke="#103959" stroke-width="2.5"/>
    <path d="${path(cumG)}" fill="none" stroke="#EAB515" stroke-width="2.5"/>
  </svg>`;
}

    <table class="admtable">
      <thead><tr><th>KW</th><th>سعر البيع (Sell)</th><th>نسبة الخصم % (منها تُحسب التكلفة)</th><th>سعر التكلفة (محسوب تلقائيًا)</th></tr></thead>
      <tbody id="adm_inv">
        ${DB.inverters.map((row,i)=>{
          const [kw,cost,list]=row;
          const disc = list>0 ? ((1-cost/list)*100) : 0;
          return `
          <tr>
            <td><input data-i="${i}" data-f="kw" type="number" value="${kw}"></td>
            <td><input data-i="${i}" data-f="list" type="number" value="${list}"></td>
            <td><input data-i="${i}" data-f="disc" type="number" step="0.1" value="${disc.toFixed(1)}"></td>
            <td class="num" style="color:var(--muted)">${fmt(cost)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="note">التكلفة = سعر البيع × (1 - نسبة الخصم%). الافتراضي 10% (وهو نفس الخصم القياسي المستخدم في ملف الإكسل الأصلي).</div>
  </div>

  <div class="card">
    <h3>أسعار البنود الأخرى (وحدة)</h3>
    <div class="assump">
      <div><label>خرسانة السلسلة (899/55 لكل حصان)</label><input type="number" id="a_steel" step="0.001" value="${DB.steelPanelPerHP}"></div>
      <div><label>الكابلات (﷼/متر)</label><input type="number" id="a_cable" value="${DB.cablePerMeter}"></div>
      <div><label>MC4 (﷼/وحدة)</label><input type="number" id="a_mc4" value="${DB.mc4PerUnit}"></div>
      <div><label>الشاسيه الثابت (﷼/سلسلة)</label><input type="number" id="a_stfix" value="${DB.structurePriceFixed}"></div>
      <div><label>الشاسيه المتحرك (﷼/سلسلة)</label><input type="number" id="a_strot" value="${DB.structurePriceRotational}"></div>
      <div><label>الخرسانة (﷼/وحدة)</label><input type="number" id="a_conc" value="${DB.concretePerUnit}"></div>
      <div><label>التأريض (﷼/وحدة)</label><input type="number" id="a_earth" value="${DB.earthingPerUnit}"></div>
      <div><label>الأنابيب المرنة (﷼/وحدة)</label><input type="number" id="a_flex" value="${DB.flexTubePerUnit}"></div>
      <div><label>التركيب (﷼/KW)</label><input type="number" id="a_inst" value="${DB.installationPerKW}"></div>
      <div><label>النقل (﷼/رحلة)</label><input type="number" id="a_trans" value="${DB.transportPerTrip}"></div>
      <div><label>ضريبة القيمة المضافة</label><input type="number" id="a_vat" step="0.01" value="${DB.vat}"></div>
    </div>
  </div>

  <div class="card">
    <h3>فئات الخصم</h3>
    <table class="admtable">
      <thead><tr><th>الاسم</th><th>نسبة من الهامش</th></tr></thead>
      <tbody>
        ${DB.discountTiers.map((d,i)=>`
          <tr><td><input data-d="${i}" data-f="label" value="${d.label}"></td>
              <td><input data-d="${i}" data-f="factor" type="number" step="0.05" value="${d.factor}"></td></tr>`).join('')}
      </tbody>
    </table>
    <label>فئة الخصم المطبّقة تلقائيًا على كل العروض (غير ظاهرة للعميل)</label>
    <select id="a_defdisc">
      ${DB.discountTiers.map((d,i)=>`<option value="${i}" ${i==(DB.defaultDiscountIdx??1)?'selected':''}>${d.label}</option>`).join('')}
    </select>
  </div>

  <div class="card">
    <h3>طلبات العملاء المُسجّلة <span class="tag">${DB.leadsWebhookUrl?'مُزامَنة سحابيًا — Google Sheet':'محفوظة محليًا على هذا الجهاز فقط'}</span></h3>
    <label>رابط المزامنة السحابية (Google Apps Script Web App URL)</label>
    <input type="text" id="a_webhook" value="${DB.leadsWebhookUrl}" placeholder="https://script.google.com/macros/s/xxxxx/exec">
    <div class="note" style="margin-top:6px">لما تضيف الرابط ده، أي عرض سعر يُطبع أو يُرسل عبر واتساب هيتسجل تلقائيًا في Google Sheet خاص بيك — تقدر تفتحه من أي جهاز في أي وقت. راجع شرح الإعداد في آخر رسالة من المساعد.</div>
    <table class="admtable" id="leadsTable" style="margin-top:10px">${renderLeadsRows()}</table>
    <div style="display:flex;gap:10px;margin-top:8px" class="no-print">
      <button class="btn ghost small" id="leadsClear">🗑️ مسح النسخة المحلية</button>
      <button class="btn ghost small" id="leadsRefresh">🔄 تحديث من السحابة</button>
    </div>
  </div>
  </div>

  <div class="card no-print">
    <h3>الحماية</h3>
    <div class="row2">
      <div><label>اسم مستخدم جديد</label><input type="text" id="adm_newuser" placeholder="اتركه فارغًا لعدم التغيير"></div>
      <div><label>كلمة مرور جديدة</label><input type="password" id="adm_newpass" placeholder="اتركه فارغًا لعدم التغيير"></div>
    </div>
    <button class="btn ghost small" id="adm_changecred" style="margin-top:10px">تحديث بيانات الدخول</button>
    <button class="btn ghost small" id="adm_logout" style="margin-top:10px">🚪 تسجيل الخروج</button>
  </div>

  <div class="card no-print">
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn" id="admSave">💾 حفظ التعديلات</button>
      <button class="btn ghost" id="admExport">⬇️ تصدير JSON</button>
      <button class="btn ghost" id="admImportBtn">⬆️ استيراد JSON</button>
      <input type="file" id="admImport" accept=".json" style="display:none">
      <button class="btn danger" id="admReset">↺ استعادة الإعدادات الافتراضية</button>
    </div>
    <div class="note" style="margin-top:12px">التعديلات تُحفظ في متصفحك الحالي فقط. لنقلها لجهاز آخر أو مشاركتها مع زميل، استخدم "تصدير JSON" ثم "استيراد JSON" على الجهاز الآخر.</div>
  </div>`;
}

/* =======================================================================
   8) WIRING
   ======================================================================= */
const app = document.getElementById('app');
let currentView = 'calc';

/* ---- simple admin login gate (client-side only) ---- */
const ADM_KEY = 'holoul_admin_cred_v1';
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i); h|=0;} return String(h); }
function getAdminCred(){
  try{ return JSON.parse(localStorage.getItem(ADM_KEY)); }catch(e){ return null; }
}
function ensureDefaultCred(){
  if(!getAdminCred()) localStorage.setItem(ADM_KEY, JSON.stringify({user:'admin', pass:hashStr('Holoul@2026')}));
}
ensureDefaultCred();
function isAdminAuthed(){ return sessionStorage.getItem('holoul_admin_authed')==='1'; }

function renderAdminLogin(){
  return `<div class="card" style="max-width:360px;margin:40px auto">
    <h3>دخول لوحة التحكم</h3>
    <label>اسم المستخدم</label>
    <input type="text" id="adm_user">
    <label>كلمة المرور</label>
    <input type="password" id="adm_pass">
    <button class="btn" id="adm_login_btn" style="margin-top:14px;width:100%">دخول</button>
    <div class="note" style="margin-top:12px">بيانات الدخول الافتراضية: admin / Holoul@2026 (يُنصح بتغييرها بعد أول دخول من داخل لوحة التحكم).</div>
  </div>`;
}

function render(){
  if(currentView==='calc') app.innerHTML = renderCalc();
  else if(currentView==='feas') app.innerHTML = renderFeas();
  else if(currentView==='admin' && !isAdminAuthed()) app.innerHTML = renderAdminLogin();
  else app.innerHTML = renderAdmin();
  wire();
}

function wire(){
  if(currentView==='admin' && !isAdminAuthed()){
    document.getElementById('adm_login_btn').onclick = ()=>{
      const u=document.getElementById('adm_user').value.trim();
      const p=document.getElementById('adm_pass').value;
      const cred=getAdminCred();
      if(cred && u===cred.user && hashStr(p)===cred.pass){
        sessionStorage.setItem('holoul_admin_authed','1'); render();
      } else alert('بيانات الدخول غير صحيحة');
    };
    return;
  }
  if(currentView==='calc'){
    document.getElementById('in_client').oninput = e=>{state.client=e.target.value; document.getElementById('bannerName').textContent=state.client||'—';};
    document.getElementById('in_phone').oninput = e=>{state.clientPhone=e.target.value; document.getElementById('bannerPhone').textContent=state.clientPhone||'—';};
    const confirmHp = ()=>{ state.hp = +document.getElementById('in_hp').value || 1; render(); };
    document.getElementById('hp_confirm').onclick = confirmHp;
    document.getElementById('in_hp').onkeydown = e=>{ if(e.key==='Enter') confirmHp(); };
    document.getElementById('in_panel').onchange = e=>{state.panelIdx=+e.target.value; render();};
    document.getElementById('in_pps').oninput = e=>{state.panelsPerStringAdjust=+e.target.value||0; render();};
    document.getElementById('in_str').oninput = e=>{state.stringsAdjust=+e.target.value||0; render();};
    document.getElementById('in_invinc').oninput = e=>{state.inverterPowerIncrease=+e.target.value||0; render();};
    const discSel = document.getElementById('in_discount');
    if(discSel) discSel.onchange = e=>{ state.discountOverrideIdx=+e.target.value; render(); };
    const unlockBtn = document.getElementById('unlockDiscount');
    if(unlockBtn) unlockBtn.onclick = ()=>adminPasswordGate(()=>{ discountUnlocked=true; render(); });
    document.querySelectorAll('[data-tgl]').forEach(c=>c.onchange=()=>{state.toggles[c.dataset.tgl]=c.checked; render();});
    document.querySelectorAll('[data-preset]').forEach(b=>b.onclick=()=>{
      if(b.dataset.preset==='materials'){
        state.toggles = {panel:true, inverter:true, ip65:false, combiner:true, cables:true, mc4:true,
                          structure:false, concrete:false, earth:false, reactor:false, installation:false, supply:false};
      } else {
        state.toggles = {panel:true, inverter:true, ip65:true, combiner:true, cables:true, mc4:true,
                          structure:true, concrete:true, earth:false, reactor:false, installation:true, supply:true};
      }
      render();
    });
    const unlockInfoBtn = document.getElementById('unlockAdminInfo');
    if(unlockInfoBtn) unlockInfoBtn.onclick = ()=>adminPasswordGate(()=>{ adminInfoUnlocked=true; render(); });
    const lockInfoBtn = document.getElementById('lockAdminInfo');
    if(lockInfoBtn) lockInfoBtn.onclick = ()=>{ adminInfoUnlocked=false; render(); };
  }
  if(currentView==='feas'){
    const map = {f_psh:'psh',f_deg:'panelDegradationPct',f_gridp:'gridPrice',f_gride:'gridEscalationPct',
                 f_dp:'dieselPrice',f_dc:'dieselConsumptionPerKWh',f_de:'dieselEscalationPct',f_om:'solarOMPctOfCapex'};
    Object.keys(map).forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.oninput = ()=>{ feasOverrides[map[id]] = +el.value; render(); };
    });
  }
  if(currentView==='admin'){
    document.getElementById('admSave').onclick = ()=>{
      document.querySelectorAll('[data-p]').forEach(inp=>{
        const i=+inp.dataset.p, f=inp.dataset.f;
        DB.panels[i][f] = (f==='brand') ? inp.value : +inp.value;
      });
      const invRows = {};
      document.querySelectorAll('[data-i]').forEach(inp=>{
        const i=+inp.dataset.i, f=inp.dataset.f;
        invRows[i] = invRows[i] || {};
        invRows[i][f] = +inp.value;
      });
      Object.keys(invRows).forEach(i=>{
        const r = invRows[i];
        const cost = r.list * (1 - (r.disc||0)/100);
        DB.inverters[i] = [r.kw, +cost.toFixed(2), r.list];
      });
      document.querySelectorAll('[data-d]').forEach(inp=>{
        const i=+inp.dataset.d, f=inp.dataset.f;
        DB.discountTiers[i][f] = (f==='label') ? inp.value : +inp.value;
      });
      DB.steelPanelPerHP=+document.getElementById('a_steel').value;
      DB.cablePerMeter=+document.getElementById('a_cable').value;
      DB.mc4PerUnit=+document.getElementById('a_mc4').value;
      DB.structurePriceFixed=+document.getElementById('a_stfix').value;
      DB.structurePriceRotational=+document.getElementById('a_strot').value;
      DB.concretePerUnit=+document.getElementById('a_conc').value;
      DB.earthingPerUnit=+document.getElementById('a_earth').value;
      DB.flexTubePerUnit=+document.getElementById('a_flex').value;
      DB.installationPerKW=+document.getElementById('a_inst').value;
      DB.transportPerTrip=+document.getElementById('a_trans').value;
      DB.vat=+document.getElementById('a_vat').value;
      DB.defaultDiscountIdx=+document.getElementById('a_defdisc').value;
      DB.leadsWebhookUrl=document.getElementById('a_webhook').value.trim();
      saveDB(DB);
      alert('تم حفظ التعديلات ✔');
      render();
    };
    document.getElementById('leadsClear').onclick = ()=>{
      if(confirm('مسح كل طلبات العملاء المسجلة محليًا؟ (لن يؤثر على بيانات Google Sheet)')){ localStorage.removeItem(LEADS_KEY); render(); }
    };
    document.getElementById('leadsRefresh').onclick = ()=>loadCloudLeads();
    if(DB.leadsWebhookUrl) loadCloudLeads();
    document.getElementById('adm_changecred').onclick = ()=>{
      const cred=getAdminCred();
      const nu=document.getElementById('adm_newuser').value.trim();
      const np=document.getElementById('adm_newpass').value;
      const newCred = {user: nu||cred.user, pass: np?hashStr(np):cred.pass};
      localStorage.setItem(ADM_KEY, JSON.stringify(newCred));
      alert('تم تحديث بيانات الدخول ✔');
      render();
    };
    document.getElementById('adm_logout').onclick = ()=>{
      sessionStorage.removeItem('holoul_admin_authed'); currentView='calc';
      document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
      document.querySelector('[data-view="calc"]').classList.add('active');
      render();
    };
    document.getElementById('addPanel').onclick = ()=>{
      DB.panels.push({brand:'جديد',power:600,vimp:40,voc:48,iimp:15,isc:16,priceW:0.5});
      render();
    };
    document.querySelectorAll('[data-delpanel]').forEach(b=>b.onclick=()=>{
      DB.panels.splice(+b.dataset.delpanel,1); render();
    });
    document.getElementById('admExport').onclick = ()=>{
      const blob = new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='holoul-pricing-data.json'; a.click();
    };
    document.getElementById('admImportBtn').onclick = ()=>document.getElementById('admImport').click();
    document.getElementById('admImport').onchange = e=>{
      const file=e.target.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload = ()=>{
        try{ DB = deepMerge(structuredClone(DEFAULT_DB), JSON.parse(reader.result)); saveDB(DB); render(); alert('تم الاستيراد ✔'); }
        catch(err){ alert('ملف غير صالح'); }
      };
      reader.readAsText(file);
    };
    document.getElementById('admReset').onclick = ()=>{
      if(confirm('استعادة كل الأسعار للإعدادات الافتراضية؟')){
        localStorage.removeItem(LS_KEY); DB = structuredClone(DEFAULT_DB); render();
      }
    };
  }
}

document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    render();
  };
});

render();
</script>
