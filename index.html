<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة عروض أسعار محطات الطاقة الشمسية | حلول الطاقة المتجددة والمقاولات - HoloulEnergy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Cairo is the only brand font. font-display:swap above shows text immediately in
   a metrics-matched fallback, then swaps to Cairo the instant it loads — no invisible
   text, no layout jump, and the brand font always wins once it's ready. */
:root{
  --ink:#122436;
  --night:#0D3452;
  --night-2:#155E85;
  --teal:#0FA98D;
  --teal-dark:#0B7A66;
  --teal-tint:#E7F8F4;
  --sun:#E7AC12;
  --sun-2:#F3CB56;
  --sun-tint:#FCF3DE;
  --sand:#F6F8F7;
  --card:#FFFFFF;
  --line:#DEE7E4;
  --muted:#63736F;
  --good:#0FA98D;
  --bad:#B0432C;
  --shadow:0 10px 30px rgba(13,52,82,.07), 0 1px 3px rgba(13,52,82,.05);
  --shadow-soft:0 1px 2px rgba(13,52,82,.05);
  --radius:12px;
  --phi-small:38.2%;
  --phi-large:61.8%;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:linear-gradient(180deg,#FFFFFF 0,#F7FAF9 260px,var(--sand) 100%);color:var(--ink);font-family:'Cairo',sans-serif;}
h1,h2,h3,.disp{font-family:'Cairo',sans-serif;}
.num{font-family:'Cairo',sans-serif;font-variant-numeric:tabular-nums;font-weight:600;}

/* header */
header.top{background:rgba(255,255,255,.94);color:var(--ink);padding:14px 28px;position:sticky;top:0;z-index:50;overflow:hidden;border-bottom:1px solid var(--line);box-shadow:var(--shadow-soft);backdrop-filter:blur(10px);}
.brandrow{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2;flex-wrap:wrap;gap:14px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand .mark{width:44px;height:44px;border-radius:10px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;padding:4px;box-shadow:var(--shadow-soft);}
.brand .mark img{width:100%;height:100%;object-fit:contain;}
.brand .name{font-family:'Cairo',sans-serif;font-weight:800;font-size:20px;color:var(--night);}
.brand .sub{font-size:12px;color:var(--muted);margin-top:2px;}
nav.tabs{display:flex;gap:6px;background:var(--sand);padding:5px;border-radius:12px;border:1px solid var(--line);}
nav.tabs button{background:transparent;border:0;color:var(--ink);padding:9px 16px;border-radius:9px;font-family:'Cairo',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:.15s;}
nav.tabs button.active{background:var(--sun);color:var(--night);}
nav.tabs button:not(.active):hover{background:#fff;}

main{max-width:1320px;margin:0 auto;padding:24px 20px 70px;}
.calc-subnav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.calc-subtab{background:var(--sand);border:1px solid var(--line);color:var(--night);font-family:'Cairo',sans-serif;font-weight:700;font-size:12.5px;padding:9px 16px;border-radius:22px;cursor:pointer;transition:.15s;}
.calc-subtab:hover{border-color:var(--teal);}
.calc-subtab.active{background:var(--night);border-color:var(--night);color:#fff;}
section.view{display:none;}
section.view.active{display:block;}

.grid2{display:grid;grid-template-columns:minmax(340px,var(--phi-small)) minmax(0,var(--phi-large));gap:21px;align-items:start;}
.input-rail{position:sticky;top:88px;align-self:start;}
@media (max-width:1020px){.grid2{grid-template-columns:1fr;}.input-rail{position:static;}}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:13px;box-shadow:var(--shadow-soft);}
.card:hover{box-shadow:0 8px 22px rgba(13,52,82,.06);}
.card h3{margin:0 0 14px;font-size:16px;display:flex;align-items:center;gap:9px;}
.card h3::before{content:"";width:4px;height:16px;border-radius:3px;background:linear-gradient(180deg,var(--teal),var(--sun));display:inline-block;}
.card h3 .tag{font-size:11px;background:var(--sand);border:1px solid var(--line);color:var(--muted);padding:2px 8px;border-radius:20px;font-family:'Cairo';font-weight:500;}

label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;font-weight:500;}
label:first-child{margin-top:0;}
input[type=text],input[type=number],select{
  width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;
  font-family:'Cairo';background:#fff;color:var(--ink);transition:border-color .15s,box-shadow .15s;
}
input[type=number]{font-family:'Cairo';}
input:focus,select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.seg button{flex:1;padding:9px;border:0;background:#fff;cursor:pointer;font-family:'Cairo';font-weight:600;font-size:13px;color:var(--muted);}
.seg button.active{background:var(--night);color:#fff;}

.toggles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
.tgl{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12.5px;cursor:pointer;user-select:none;transition:background .15s,border-color .15s,transform .12s;}
.tgl:has(input:checked){background:var(--teal-tint);border-color:var(--teal);}
.tgl:hover{transform:translateY(-1px);}
.tgl input{margin:0;accent-color:var(--teal);}

details.adv{margin-top:14px;border-top:1px dashed var(--line);padding-top:10px;}
details.adv summary{cursor:pointer;font-size:13px;color:var(--night-2);font-weight:600;}

/* results */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:8px;margin-bottom:4px;}
.stat{background:#fff;border:1px solid var(--line);border-inline-end:3px solid var(--teal);border-radius:10px;padding:11px 13px;}
.stat .v{font-family:'Cairo';font-size:19px;font-weight:600;color:var(--night);}
.stat .l{font-size:11.5px;color:var(--muted);margin-top:3px;}

table.bom{width:100%;border-collapse:collapse;font-size:13px;}
table.bom th{text-align:right;color:var(--muted);font-weight:600;font-size:11.5px;padding:8px 8px;border-bottom:2px solid var(--night);position:sticky;top:74px;background:#fff;z-index:1;}
table.bom td{padding:9px 8px;border-bottom:1px solid #EFEBE0;}
table.bom tr.off td{opacity:.35;}
table.bom tr:hover td{background:var(--sand);}
table.bom td.num,table.bom th.num{font-family:'Cairo';text-align:left;}

.totalbar{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,var(--night) 0%,var(--night-2) 100%);color:#fff;border-radius:12px;padding:18px 20px;margin-top:14px;flex-wrap:wrap;gap:10px;box-shadow:0 14px 32px rgba(13,52,82,.18);}
.totalbar .big{font-family:'Cairo',sans-serif;font-weight:800;font-size:clamp(24px,3vw,34px);color:var(--sun-2);}
.totalbar .lbl{font-size:12px;color:#BFE3D6;}

.pay3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
.pay3 div{text-align:center;padding:4px 6px;}
.pay3 .p{font-weight:600;font-size:13px;color:var(--ink);}
.pay3 .l{font-size:10px;color:var(--muted);margin-top:2px;}

.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--sun-2),var(--sun));color:var(--night);border:0;padding:11px 18px;border-radius:10px;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 2px 6px rgba(231,172,18,.3);transition:transform .1s,box-shadow .15s;}
.btn:hover{box-shadow:0 3px 10px rgba(231,172,18,.4);transform:translateY(-1px);}
.btn.ghost{background:transparent;border:1px solid var(--teal);color:var(--teal-dark);box-shadow:none;}
.btn.ghost:hover{background:var(--teal-tint);transform:none;}
.btn.small{padding:7px 12px;font-size:12.5px;}
.btn.danger{background:#F4E4E0;color:var(--bad);box-shadow:none;}

.note{font-size:12px;color:var(--muted);line-height:1.7;background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}

/* admin */
.admtable{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px;}
.admtable th{font-size:11px;color:var(--muted);text-align:right;padding:6px;}
.admtable td{padding:5px;}
.admtable input{padding:6px 8px;font-size:12.5px;}
.admtable td.op{width:34px;text-align:center;}

.product-category table.admtable thead th{
  position:sticky;top:0;background:#fff;z-index:2;
  box-shadow:0 1px 0 var(--line);
  font-size:12px;padding:8px 6px;color:var(--ink);font-weight:700;
}
.product-category table.admtable td.num{font-family:'Cairo';text-align:left;white-space:nowrap;}

/* ===================== Product catalog — golden-ratio layout system =====================
   Spacing follows a Fibonacci scale (8/13/21/34/55/89px), a discrete stand-in for φ≈1.618
   where each step is ~1.6× the previous. Photo/content splits use 1.618fr : 1fr directly. */
:root{
  --sp-1:8px; --sp-2:13px; --sp-3:21px; --sp-4:34px; --sp-5:55px; --sp-6:89px;
}

.crumbs{display:flex;align-items:center;gap:var(--sp-1);font-size:12.5px;color:var(--muted);flex-wrap:wrap;}
.crumbs button{background:none;border:0;color:var(--night-2);font-family:'Cairo';font-weight:700;font-size:12.5px;cursor:pointer;padding:0;}
.crumbs button:hover{text-decoration:underline;}
.crumbs .sep{opacity:.45;}
.crumbs .current{color:var(--muted);font-weight:600;}

/* Level 1 — category grid: each tile is a golden rectangle (φ≈1.618:1) photo
   with the label overlaid like a catalog cover, instead of a small icon+caption. */
.category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:var(--sp-3);}
.category-card{position:relative;cursor:pointer;border-radius:var(--radius);overflow:hidden;aspect-ratio:1.618/1;
  border:1px solid var(--line);box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;background:var(--sand);}
.category-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(13,52,82,.16);}
.category-card img{width:100%;height:100%;object-fit:cover;display:block;}
.category-card .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:44px;
  background:linear-gradient(135deg,var(--teal-tint),var(--sun-tint));color:var(--teal-dark);}
.category-card .overlay{position:absolute;inset-inline:0;bottom:0;padding:var(--sp-3) var(--sp-3) var(--sp-2);
  background:linear-gradient(0deg,rgba(13,36,54,.92) 0%,rgba(13,36,54,.5) 65%,transparent 100%);color:#fff;}
.category-card .overlay h3{margin:0 0 3px;font-size:15px;font-weight:700;color:#fff;}
.category-card .overlay .count{font-size:11.5px;color:#DCEDE8;opacity:.92;}

/* Level 2 — category header: golden split, photo ≈61.8% / info ≈38.2% */
.category-hero{display:grid;grid-template-columns:1.618fr 1fr;border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:var(--sp-3);background:var(--card);}
.category-hero .photo{position:relative;min-height:190px;background:var(--sand);}
.category-hero .photo img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;}
.category-hero .photo .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;
  background:linear-gradient(135deg,var(--teal-tint),var(--sun-tint));color:var(--teal-dark);}
.category-hero .info{padding:var(--sp-4);display:flex;flex-direction:column;justify-content:center;gap:var(--sp-2);}
.category-hero .info h2{margin:0;font-size:19px;color:var(--night);}
.category-hero .info .modelcount{display:inline-flex;width:fit-content;align-items:center;gap:6px;background:var(--sun-tint);
  color:#8A6208;border:1px solid var(--sun-2);font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:20px;}
@media (max-width:760px){.category-hero{grid-template-columns:1fr;}.category-hero .photo{aspect-ratio:1.618/1;min-height:0;}}

.viewmode-toggle{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-top:var(--sp-2);}
.viewmode-toggle button{background:#fff;border:0;padding:7px 13px;font-family:'Cairo';font-weight:600;font-size:12.5px;color:var(--muted);cursor:pointer;}
.viewmode-toggle button.active{background:var(--night);color:#fff;}
.viewmode-toggle button:not(.active):hover{background:var(--sand);}

/* list mode: one wide row per model instead of a multi-column card grid */
.model-list.view-list{grid-template-columns:1fr;}
.model-list.view-list .model-card{padding:var(--sp-1) var(--sp-2);}
.model-list.view-list .model-card .specs{flex-wrap:nowrap;overflow:hidden;}
.model-list.view-list .model-card .body{display:flex;align-items:center;gap:var(--sp-3);min-width:0;}
.model-list.view-list .model-card .name{margin-bottom:0;flex:0 0 auto;white-space:nowrap;}
.model-list.view-list .model-card .side{flex-direction:row;align-items:center;gap:var(--sp-2);}
.model-list.view-list .model-card .price small{display:inline;margin-inline-start:4px;}
@media (max-width:640px){
  .model-list.view-list .model-card .body{flex-direction:column;align-items:flex-start;gap:2px;}
  .model-list.view-list .model-card .name{white-space:normal;}
  main{padding-bottom:100px;}
}

/* model list — scannable cards instead of a dense spreadsheet-style table */
.model-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:var(--sp-2);margin-top:var(--sp-3);}
.model-card{display:flex;gap:var(--sp-2);align-items:center;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:var(--sp-2);transition:.15s;}
.model-card:hover{border-color:var(--teal);box-shadow:0 4px 14px rgba(13,52,82,.09);}
.model-card.unavailable-row{opacity:.5;}
.model-card .thumb{flex:0 0 55px;width:55px;height:55px;border-radius:9px;background:var(--sand);object-fit:cover;}
.model-card .thumb-noimg{flex:0 0 55px;width:55px;height:55px;border-radius:9px;background:var(--sand);display:flex;
  align-items:center;justify-content:center;font-size:20px;color:var(--muted);}
.model-card .body{flex:1;min-width:0;}
.model-card .name{font-weight:700;font-size:13.5px;color:var(--ink);margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.model-card .specs{display:flex;flex-wrap:wrap;gap:5px;}
.model-card .specs span{font-size:10.5px;color:var(--muted);background:var(--sand);border:1px solid var(--line);
  padding:2px 7px;border-radius:8px;white-space:nowrap;}
.model-card .side{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex:0 0 auto;text-align:left;}
.model-card .price{font-family:'Cairo';font-weight:700;font-size:14px;color:var(--teal-dark);white-space:nowrap;}
.model-card .price small{display:block;font-weight:600;font-size:9px;color:var(--muted);}
.model-card .price-sub{font-size:10px;color:var(--muted);white-space:nowrap;margin-top:-4px;}
.unavail-chip{background:#FBEAEA;color:var(--bad);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.chip{background:var(--panel-2,#F0F4F8);color:var(--ink);padding:3px 9px;border-radius:20px;white-space:nowrap;border:1px solid var(--line);}
.chip-muted{opacity:.6;}

/* Level 3 — product detail: golden split, photo ≈61.8% / spec panel ≈38.2% */
.detail-split{display:grid;grid-template-columns:1.618fr 1fr;gap:var(--sp-3);align-items:start;}
.detail-split .photo{border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);background:var(--sand);
  box-shadow:var(--shadow);aspect-ratio:1.618/1;}
.detail-split .photo img{width:100%;height:100%;object-fit:cover;display:block;}
.detail-split .photo .noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;
  background:linear-gradient(135deg,var(--teal-tint),var(--sun-tint));color:var(--teal-dark);}
@media (max-width:820px){.detail-split{grid-template-columns:1fr;}}

tr.unavailable-row{opacity:.55;}

.assump{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}

svg.chart{width:100%;height:260px;}
.fab-bar{position:fixed;inset-inline-end:18px;bottom:18px;z-index:500;display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
.fab{display:flex;align-items:center;gap:8px;border:0;border-radius:30px;padding:12px 18px;font-family:'Cairo',sans-serif;font-weight:700;font-size:13.5px;cursor:pointer;text-decoration:none;box-shadow:0 6px 18px rgba(13,52,82,.22);transition:transform .15s ease,box-shadow .15s ease;white-space:nowrap;}
.fab:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(13,52,82,.28);}
.fab-icon{font-size:17px;line-height:1;}
.fab-wa{background:#25D366;color:#fff;}
.fab-quote{background:linear-gradient(135deg,var(--sun-2),var(--sun));color:var(--night);}
@media (max-width:640px){
  .fab-bar{inset-inline-end:12px;bottom:12px;gap:8px;}
  .fab{padding:12px;border-radius:50%;box-shadow:0 6px 16px rgba(13,52,82,.28);}
  .fab-label{display:none;}
  .fab-icon{font-size:20px;}
}
.reload-badge .spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-6px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.quote-loading{position:relative;transition:opacity .12s;}
.quote-loading::after{content:"";position:absolute;inset:0;border-radius:var(--radius);pointer-events:none;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:quoteShimmer 1.05s linear infinite;}
@keyframes quoteShimmer{from{transform:translateX(70%);}to{transform:translateX(-70%);}}

.quote-shell{min-width:0;}
.quote-banner{background:linear-gradient(135deg,#fff 0%,#fff 62%,var(--teal-tint) 100%);}
.hero-summary{display:grid;grid-template-columns:1fr auto;gap:13px;align-items:center;}
.hero-summary .price-card{background:var(--night);color:#fff;border-radius:12px;padding:14px 18px;min-width:230px;text-align:center;}
.hero-summary .price-card .big{font-size:clamp(24px,3.2vw,36px);font-weight:800;color:var(--sun-2);}
.compact-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.preset-list{display:grid;gap:8px;}
.preset-list button{text-align:right;justify-content:flex-start;width:100%;}
.portfolio-eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(231,172,18,.16);border:1px solid rgba(231,172,18,.4);color:var(--sun-2);font-size:11.5px;font-weight:700;letter-spacing:.03em;padding:5px 13px;border-radius:20px;margin-bottom:14px;}
.portfolio-eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--sun-2);}
.portfolio-hero{display:grid;grid-template-columns:1.618fr 1fr;gap:21px;align-items:stretch;margin-bottom:21px;}
.portfolio-hero .visual{position:relative;overflow:hidden;border-radius:var(--radius);min-height:420px;border:1px solid var(--line);box-shadow:var(--shadow);}
.portfolio-hero .visual img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s ease;}
.portfolio-hero .visual:hover img{transform:scale(1.035);}
.portfolio-hero .visual::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(9,26,40,.92) 0%,rgba(9,26,40,.35) 48%,rgba(9,26,40,.08) 75%);}
.portfolio-hero .caption{position:absolute;inset-inline:28px;bottom:26px;color:#fff;z-index:1;}
.portfolio-hero .caption h2{font-size:clamp(28px,4.2vw,46px);line-height:1.16;margin:0 0 10px;color:#fff;font-weight:800;letter-spacing:-.01em;}
.portfolio-hero .caption p{margin:0;max-width:680px;color:#DCEDEA;font-size:14px;line-height:1.85;}
.portfolio-hero .panel{position:relative;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(155deg,var(--night) 0%,#0A2A42 100%);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow);overflow:hidden;}
.portfolio-hero .panel::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 85% 0%,rgba(231,172,18,.14),transparent 55%);pointer-events:none;}
.portfolio-hero .panel h3{color:#fff;font-size:17px;margin:0 0 10px;position:relative;}
.portfolio-hero .panel .note{color:#B7CBD8;position:relative;}
.portfolio-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:20px;position:relative;}
.portfolio-kpi{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:14px;}
.portfolio-kpi .v{font-size:23px;font-weight:800;color:var(--sun-2);letter-spacing:-.01em;}
.portfolio-kpi .l{font-size:11.5px;color:#B7CBD8;margin-top:4px;line-height:1.4;}

/* IRR via bisection on a cash-flow array where cf[0] is the year-0 outlay */
function irr(cf){
  function npv(r){ return cf.reduce((s,c,i)=>s + c/Math.pow(1+r,i), 0); }
  let lo=-0.9, hi=5, mid;
  if(npv(lo)*npv(hi) > 0) return null;
  for(let i=0;i<100;i++){
    mid=(lo+hi)/2;
    if(npv(lo)*npv(mid) <= 0) hi=mid; else lo=mid;
  }
  return mid;
}

function computeFeasibility(capex, calcKW, opt){
  const f = {...cachedFeas, ...opt};
  const baseGen = calcKW*f.psh*365;
  const years = f.years;
  const genArr=[], gridArr=[], dieselArr=[];
  let cumGrid=-capex, cumDiesel=-capex, paybackGrid=null, paybackDiesel=null;
  const cfGrid=[-capex], cfDiesel=[-capex];
  const omYear = capex*f.solarOMPctOfCapex/100;
  for(let y=1;y<=years;y++){
    const gen = baseGen*Math.pow(1-f.panelDegradationPct/100, y-1);
    const gridVal = gen*f.gridPrice*Math.pow(1+f.gridEscalationPct/100, y-1);
    const dieselVal = gen*f.dieselConsumptionPerKWh*f.dieselPrice*Math.pow(1+f.dieselEscalationPct/100, y-1);
    const om = y===1?0:omYear;
    const netGrid = gridVal-om, netDiesel = dieselVal-om;
    genArr.push(gen); gridArr.push(netGrid); dieselArr.push(netDiesel);
    cfGrid.push(netGrid); cfDiesel.push(netDiesel);
    cumGrid+=netGrid; cumDiesel+=netDiesel;
    if(paybackGrid===null && cumGrid>=0) paybackGrid = y-1 + (netGrid-cumGrid)/netGrid;
    if(paybackDiesel===null && cumDiesel>=0) paybackDiesel = y-1 + (netDiesel-cumDiesel)/netDiesel;
  }
  const litersYear1 = genArr[0]*f.dieselConsumptionPerKWh;
  const co2Year1 = litersYear1*f.co2FactorKgPerLiter/1000;
  return {
    genArr, gridArr, dieselArr,
    paybackGrid, paybackDiesel,
    irrGrid: irr(cfGrid), irrDiesel: irr(cfDiesel),
    profit30Grid: cfGrid.reduce((a,b)=>a+b,0),
    profit30Diesel: cfDiesel.reduce((a,b)=>a+b,0),
    litersYear1, co2Year1, cfGrid, cfDiesel
  };
}

// html2pdf.js clones the element AGAIN internally before rendering it
// (a documented bug in the library). That second, detached clone can fail
// to resolve CSS custom properties (var(--ink), var(--card), var(--line)...)
// which this app uses everywhere for colors — the result would be borders
// showing up while all text/fills come out white/blank. To avoid this
// entirely, and to avoid the internal re-clone breaking Arabic RTL/bidi
// text (fused words, scrambled digits), we bypass html2pdf.js and use
// html2canvas + jsPDF directly on our OWN clone, which stays attached to
// the live document (correct dir="rtl", fonts, styles) the whole time.

// "Flatten" every resolved color onto the clone as a literal inline style
// (e.g. color:rgb(21,42,56)) BEFORE capture, so there is no var() left
// that anything could fail to resolve.
const FLATTEN_PROPS = [
  'color','backgroundColor',
  'borderTopColor','borderRightColor','borderBottomColor','borderLeftColor'
];
function flattenComputedColors(liveRoot, cloneRoot){
  const liveEls = [liveRoot, ...liveRoot.querySelectorAll('*')];
  const cloneEls = [cloneRoot, ...cloneRoot.querySelectorAll('*')];
  liveEls.forEach((liveEl, i)=>{
    const cloneEl = cloneEls[i];
    if(!cloneEl) return;
    const cs = getComputedStyle(liveEl);
    FLATTEN_PROPS.forEach(prop=>{ cloneEl.style[prop] = cs[prop]; });
  });
}

// Picks a safe html2canvas scale per device. Mobile/tablet browsers
// (especially iOS Safari and in-app webviews like WhatsApp) silently
// return a BLANK canvas when the rendered pixel area is too large, so we
// cap the scale more conservatively there than on desktop/laptop.
function getCaptureScale(){
  const ua = navigator.userAgent || '';
  const isTablet = /iPad|Tablet/i.test(ua) || (/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1);
  const isMobile = /iPhone|iPod|Android/i.test(ua) && !isTablet;
  const dpr = window.devicePixelRatio || 1;
  if(isMobile) return Math.max(1, Math.min(dpr, 1.5));
  if(isTablet) return Math.max(1, Math.min(dpr, 1.75));
  return Math.max(1, Math.min(dpr, 2)) || 2;
}

async function downloadQuotePdf(filename){
  const src = document.getElementById('quotePrintArea');
  if(!src || typeof html2canvas==='undefined') return false;
  const clone = src.cloneNode(true);

  // Flatten colors BEFORE removing .no-print nodes, so the live/clone
  // element lists still line up 1:1 in the same order.
  flattenComputedColors(src, clone);
  clone.querySelectorAll('.no-print').forEach(el=>el.remove());
  // Use the exact same compact layout/typography as the browser's own
  // Print/Save-as-PDF (@media print), so both outputs look identical.
  clone.classList.add('pdf-compact');

  const CAPTURE_WIDTH = 760;
  clone.style.maxWidth = CAPTURE_WIDTH+'px';
  clone.style.width = CAPTURE_WIDTH+'px';
  clone.style.backgroundColor = '#ffffff';
  // Force the correct text direction/language explicitly on the clone
  // itself, since it's what keeps Arabic word-joining and bidi digit
  // order correct.
  clone.setAttribute('dir','rtl');
  clone.setAttribute('lang','ar');

  // IMPORTANT: keep the clone inside the viewport's coordinate space
  // (top:0; left:0) instead of pushing it far off-screen (e.g. left:-9999px).
  // Many mobile/tablet browsers (iOS Safari, Chrome/WhatsApp webviews) skip
  // painting fixed-position content placed outside the visible viewport
  // bounds, which produces a fully white/blank PDF. Using a very low
  // z-index keeps it invisible behind the real page instead.
  const wrapper = document.createElement('div');
  wrapper.setAttribute('dir','rtl');
  wrapper.style.cssText = [
    'position:fixed',
    'top:0',
    'left:0',
    'z-index:-9999',
    'pointer-events:none',
    'background:#fff',
    'padding:14px',
    `width:${CAPTURE_WIDTH+28}px`,
    'overflow:visible'
  ].join(';');
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  // Give mobile browsers a couple of frames to actually lay out and paint
  // the clone before html2canvas snapshots it (fixes intermittent blanks
  // on phones/tablets where layout isn't ready on the very next tick).
  await new Promise(resolve=>requestAnimationFrame(()=>requestAnimationFrame(resolve)));

  try{
    const canvas = await html2canvas(clone, {
      scale: getCaptureScale(),
      useCORS: true,
      backgroundColor: '#ffffff',
      windowWidth: CAPTURE_WIDTH+28,
      windowHeight: Math.max(wrapper.scrollHeight, clone.scrollHeight)
    });

    const JsPdfCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
    if(!JsPdfCtor) throw new Error('jsPDF not available');

    // Build the PDF ourselves so we can force everything onto ONE A4 page
    // (shrink-to-fit) instead of letting content spill onto a second page.
    const pdf = new JsPdfCtor({unit:'mm', format:'a4', orientation:'portrait'});
    const pageW = 210, pageH = 297, margin = 8;
    const usableW = pageW - margin*2, usableH = pageH - margin*2;
    // PNG (lossless) instead of JPEG: avoids compression artifacts around
    // small text/numbers in the pricing table, which is what matters most
    // here — a client must be able to read every figure without ambiguity.
    const imgData = canvas.toDataURL('image/png');
    const imgRatio = canvas.height / canvas.width;

    let drawW = usableW;
    let drawH = drawW * imgRatio;
    if(drawH > usableH){
      // Content is taller than one page at full width — shrink further so
      // the whole thing still fits within a single A4 page.
      drawH = usableH;
      drawW = drawH / imgRatio;
    }
    const x = margin + (usableW - drawW)/2;
    const y = margin + (usableH - drawH)/2;

    pdf.addImage(imgData, 'PNG', x, y, drawW, drawH);
    pdf.save(filename);
    return true;
  }catch(err){
    console.error('PDF generation failed', err);
    return false;
  }finally{
    document.body.removeChild(wrapper);
  }
}

function buildChart(cfGrid, cfDiesel){
  const cumG=[], cumD=[]; let cg=0, cd=0;
  cfGrid.forEach(v=>{cg+=v; cumG.push(cg);});
  cfDiesel.forEach(v=>{cd+=v; cumD.push(cd);});
  const W=900,H=240,pad=36;
  const allVals=[...cumG,...cumD];
  const maxV=Math.max(...allVals), minV=Math.min(...allVals,0);
  const n=cumG.length;
  const x=i=>pad+(W-2*pad)*i/(n-1);
  const y=v=>H-pad-(H-2*pad)*(v-minV)/(maxV-minV||1);
  const path=arr=>arr.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const zeroY=y(0);
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${pad}" y1="${zeroY}" x2="${W-pad}" y2="${zeroY}" stroke="#C9C4B4" stroke-width="1" stroke-dasharray="4 4"/>
    <path d="${path(cumD)}" fill="none" stroke="#103959" stroke-width="2.5"/>
    <path d="${path(cumG)}" fill="none" stroke="#EAB515" stroke-width="2.5"/>
  </svg>`;
}

              <tbody>
                ${cat.columns.map((c,i)=>`<tr><td style="font-weight:600;width:150px">${c}</td><td class="num">${row[i]}</td></tr>`).join('')}
              </tbody>
            </table>
            ${detail.description ? `<div class="note" style="margin-top:var(--sp-2);font-size:13px">${detail.description}</div>` : ''}
          </div>
        </div>
        ${detail.specs && Object.keys(detail.specs).length ? `
        <h3 style="margin-top:var(--sp-4)">مواصفات إضافية</h3>
        <table class="admtable">
          <tbody>
            ${Object.entries(detail.specs).map(([k,v])=>`<tr><td style="font-weight:600;width:180px">${k}</td><td>${v}</td></tr>`).join('')}
          </tbody>
        </table>` : ''}
        ${cat.categoryInfo ? `<div class="note" style="margin-top:var(--sp-2)">${cat.categoryInfo}</div>` : ''}
      </div>`;
    }
  }

  // ---- Level 2: model list within one category ----
  if(productsNav==='category' && selectedCategoryIdx!=null){
    const cat = catalog[selectedCategoryIdx];
    if(!cat){ productsNav='categories'; }
    else {
      return `
      <div class="card no-print">
        <div class="crumbs" style="margin-bottom:var(--sp-2)">
          <button id="backToCategoriesBtn">كل الفئات</button>
          <span class="sep">/</span>
          <span class="current">${cat.category}</span>
        </div>
        <input type="text" id="productSearch" placeholder="ابحث في ${cat.category}...">
        <div class="viewmode-toggle" role="group" aria-label="طريقة العرض">
          <button class="${productViewMode==='cards'?'active':''}" data-viewmode="cards">▦ كروت</button>
          <button class="${productViewMode==='list'?'active':''}" data-viewmode="list">☰ ليستة</button>
        </div>
      </div>
      <div class="category-hero product-category" data-cat="${selectedCategoryIdx}">
        <div class="photo">${cat.categoryImage ? `<img src="${cat.categoryImage}" alt="${cat.category}">` : `<div class="noimg">📦</div>`}</div>
        <div class="info">
          <h2>${cat.category}</h2>
          <span class="modelcount">${cat.rows.length} موديل</span>
          ${cat.categoryInfo ? `<p class="note">${cat.categoryInfo}</p>` : ''}
        </div>
        <div class="model-list view-${productViewMode}" style="grid-column:1/-1;padding:0 var(--sp-3) var(--sp-3)">
          ${cat.rows.map((row,ri)=>{
            const available = isProductAvailable(cat, ri);
            const detail = (cat.productDetails && cat.productDetails[ri]) || {};
            const thumb = detail.image || '';
            const nCols = cat.columns.length;
            // convention (matches the rest of the app): the LAST TWO columns are
            // the sell price and the tax-inclusive price; everything between
            // the name (col 0) and those two is a spec, shown as a small chip.
            const midCols = cat.columns.slice(1, Math.max(1, nCols-2));
            const midVals = row.slice(1, Math.max(1, nCols-2));
            const priceLbl = cat.columns[nCols-1] || '';
            const priceVal = row[nCols-1];
            const price2Lbl = nCols>=2 ? (cat.columns[nCols-2]||'') : '';
            const price2Val = nCols>=2 ? row[nCols-2] : '';
            return `<div class="model-card product-row${available?'':' unavailable-row'}" data-search="${row.join(' ').toLowerCase()}">
              ${thumb ? `<img class="thumb" src="${thumb}" alt="${row[0]}">` : `<div class="thumb-noimg">📦</div>`}
              <div class="body">
                <div class="name">${row[0]}${!available?' <span class="unavail-chip">غير متاح</span>':''}</div>
                <div class="specs">${midCols.map((c,i)=>`<span>${c}: ${midVals[i]}</span>`).join('')}</div>
              </div>
              <div class="side">
                <div class="price">${priceVal}<small>${priceLbl}</small></div>
                ${price2Lbl && nCols>=3 ? `<div class="price-sub">${price2Val} · ${price2Lbl}</div>` : ''}
                <button class="btn ghost small" data-viewproduct="${selectedCategoryIdx}:${ri}">التفاصيل</button>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }
  }

  // ---- Level 1: main categories landing page ----
  return `
  <div class="card no-print">
    <h3>قائمة المنتجات</h3>
    <div class="note">اختر نوع المنتج لعرض الموديلات المتاحة</div>
  </div>

    ${catalog.map((cat,ci)=>`

          <div class="count">${cat.rows.length} موديل${cat.categoryInfo ? ' · '+cat.categoryInfo : ''}</div>
        </div>
      </div>`).join('')}
  </div>
  ${!catalog.length ? `<div class="card"><div class="note">لا توجد منتجات مسجّلة بعد.</div></div>` : ''}
  `;
}

async function loadProductCatalog(){
  productCatalogLoading = true;
  productCatalogError = null;
  try{
    const data = await callEngine('get-product-catalog', {});
    cachedProductCatalog = data.productCatalog || [];
  }catch(e){
    productCatalogError = e.message || 'تعذر الاتصال بالخادم';
  }
  productCatalogLoading = false;
  render();
}

// ---------------------------------------------------------------------------
// Ready-made off-grid packages — display-only browsing (no sizing calculation).
// A rep/client picks one of these fixed named systems instead of running the
// dynamic off-grid calculator. Data comes straight from D.readyOffgridSystems.
// ---------------------------------------------------------------------------
async function loadReadySystems(){
  readySystemsLoading = true;
  readySystemsError = null;
  try{
    const data = await callEngine('get-ready-offgrid-systems', {});
    cachedReadySystems = data.systems || [];
  }catch(e){
    readySystemsError = e.message || 'تعذر الاتصال بالخادم';
  }
  readySystemsLoading = false;
  render();
}

function readySystemCoolingLine(s){
  if(s.acType === 'لا يوجد' || (!s.acCountDay && !s.acCountNight)) return `<span class="chip chip-muted">❄️ بدون تبريد</span>`;
  const parts = [];
  if(s.acCountDay) parts.push(`${s.acCountDay}× ${s.acPowerDayW}W نهارًا ${s.acHoursDay}س`);
  if(s.acCountNight) parts.push(`${s.acCountNight}× ${s.acPowerNightW}W ليلاً ${s.acHoursNight}س`);
  return `<span class="chip">❄️ ${s.acType} — ${parts.join(' + ')}</span>`;
}

function renderReadySystems(){
  if(!cachedReadySystems && !readySystemsLoading && !readySystemsError){
    loadReadySystems();
  }
  if(readySystemsLoading && !cachedReadySystems){
    return `<div class="card" style="max-width:420px;margin:60px auto;text-align:center"><h3>جارِ التحميل...</h3></div>`;
  }
  if(readySystemsError){
    return `<div class="card" style="max-width:420px;margin:60px auto;text-align:center">
      <h3 style="color:#B0432C">تعذر تحميل المنظومات الجاهزة</h3>
      <div class="note">${readySystemsError}</div>
      <button class="btn small" id="retryReadyBtn" style="margin-top:12px">إعادة المحاولة</button>
    </div>`;
  }
  const systems = cachedReadySystems || [];
  return `
  <div class="card no-print">
    <h3>منظومات أوف-جريد جاهزة</h3>
    <div class="note">منظومات ثابتة بالاسم والسعر — اختر الأنسب لاحتياج العميل مباشرة بدون حساب. أرقام التبريد والإضاءة توضح فعليًا إيه اللي بتشغّله كل منظومة.</div>
  </div>
  <div class="ready-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px">
    ${systems.map(s=>`
      <div class="card" style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <h3 style="margin:0">${s.name}</h3>
          <span class="${s.status==='متوفر'?'tag':'unavail-chip'}">${s.status}</span>
        </div>
        <div class="big num" style="font-size:20px">${fmt(s.priceSar)} ﷼</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;font-size:11.5px">
          ${readySystemCoolingLine(s)}
          ${s.fridgeCount ? `<span class="chip">🧊 ثلاجة ${s.fridgeHours}س</span>` : `<span class="chip chip-muted">🧊 بدون ثلاجة</span>`}
          ${s.lampCount ? `<span class="chip">💡 ${s.lampCount}× ${s.lampPowerW}W — ${s.lampHours}س</span>` : ''}
          ${s.otherDevices ? `<span class="chip">${s.otherDevices}</span>` : ''}
        </div>
        <table class="admtable" style="margin-top:4px">
          <tbody>
            <tr><td style="font-weight:600">الإنفرتر</td><td class="num">${s.inverterBrand} ${s.inverterPowerW?fmt(s.inverterPowerW)+'W':''}</td></tr>
            <tr><td style="font-weight:600">البطاريات</td><td class="num">${s.batteryType} — ${s.batteryCount}× ${s.batteryUnitCapacity}${s.batteryCapacityUnit}</td></tr>
            <tr><td style="font-weight:600">الألواح</td><td class="num">${s.panelCount}× ${s.panelPowerW}W</td></tr>
          </tbody>
        </table>
        ${s.notes ? `<div class="note" style="font-size:11px">${s.notes}</div>` : ''}
        <button class="btn ghost small" style="margin-top:4px" onclick="sendReadySystemWhatsapp('${s.name.replace(/'/g,"\\'")}', ${s.priceSar})">📤 إرسال للعميل (واتساب)</button>
      </div>`).join('')}
  </div>
  ${!systems.length ? `<div class="card"><div class="note">لا توجد منظومات جاهزة مسجّلة بعد.</div></div>` : ''}
  `;
}

function sendReadySystemWhatsapp(name, priceSar){
  const msg = `حلول الطاقة المتجددة والمقاولات — HoloulEnergy\n\nمنظومة أوف-جريد جاهزة: ${name}\nالسعر: ${fmt(priceSar)} ﷼\n\nللتواصل: 966561274344+`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg), '_blank');
}

const app = document.getElementById('app');
let currentView = 'calc';

/* ---- rep login gate — every rep has their own username/password, verified
   server-side. Session is kept in sessionStorage so a refresh doesn't force
   a re-login, but it's gone once the tab is closed. ---- */
let repAuthed = false, repUsername = null, repTokenMem = null, repDisplayName = null;
try{

  if(savedRep && savedRep.username && savedRep.token){
    repUsername = savedRep.username; repTokenMem = savedRep.token; repDisplayName = savedRep.displayName;

}catch(e){}

/* ---- admin login gate — password verified server-side (see adminPasswordGate) ---- */
let adminAuthed = false;

function renderAdminLogin(){
  return `<div class="card" style="max-width:360px;margin:40px auto">

function render(){
  if(!repAuthed && !guestMode && currentView!=='admin' && currentView!=='products' && currentView!=='portfolio' && currentView!=='ready'){ app.innerHTML = renderRepLogin(); wire(); return; }
  if(guestMode && !guestRegistered && currentView!=='admin' && currentView!=='products' && currentView!=='portfolio' && currentView!=='ready'){ app.innerHTML = renderGuestRegister(); wire(); return; }
  if(currentView==='calc') app.innerHTML = renderCalc();
  else if(currentView==='feas') app.innerHTML = renderFeas();
  else if(currentView==='ready') app.innerHTML = renderReadySystems();
  else if(currentView==='products') app.innerHTML = renderProducts();
  else if(currentView==='portfolio') app.innerHTML = renderPortfolio();
  else if(currentView==='admin' && !adminAuthed) app.innerHTML = renderAdminLogin();
  else app.innerHTML = renderAdmin();
  wire();
}

function wire(){
  if(!repAuthed && !guestMode && currentView!=='admin' && currentView!=='products' && currentView!=='portfolio' && currentView!=='ready'){
    document.getElementById('rep_login_btn').onclick = async ()=>{
      const username = document.getElementById('rep_user').value.trim();
      const password = document.getElementById('rep_pass').value;
      const errBox = document.getElementById('rep_login_err');
      try{
        const data = await callEngine('rep-login', { username, password });
        repUsername = username; repTokenMem = data.token; repDisplayName = data.displayName; repAuthed = true;
        sessionStorage.setItem('holoul_rep_session', JSON.stringify({username, token:data.token, displayName:data.displayName}));
        showRepBadge();
        refresh();
      }catch(e){
        errBox.textContent = e.message || 'بيانات الدخول غير صحيحة';
        errBox.style.display = 'block';
      }
    };
    document.getElementById('guestModeBtn').onclick = ()=>{
      guestMode = true;
      render();
    };
    return;
  }
  if(guestMode && !guestRegistered && currentView!=='admin' && currentView!=='products' && currentView!=='portfolio' && currentView!=='ready'){
    document.getElementById('guest_register_btn').onclick = ()=>{
      const name = document.getElementById('guest_name').value.trim();
      const phone = document.getElementById('guest_phone').value.trim();
      if(!name || !phone){ alert('من فضلك اكتب اسمك ورقم جوالك'); return; }
      state.client = name; state.clientPhone = phone;
      guestRegistered = true;
      showRepBadge();
      refresh();
    };
    return;
  }
  if(currentView==='admin' && !adminAuthed){
    document.getElementById('adm_login_btn').onclick = async ()=>{
      const p=document.getElementById('adm_pass').value;
      try{
        const loginData = await callEngine('admin-login', { adminPassword: p });
        adminTokenMem = loginData.token;
        const data = await callEngine('admin-config', { adminToken: adminTokenMem });
        adminConfig = normalizeAdminConfig(data.config); adminAuthed = true;
        try{
          const repsData = await callEngine('admin-list-reps', { adminToken: adminTokenMem });
          adminReps = repsData.reps || [];
        }catch(e){ adminReps = []; }
        render();
      }catch(e){ adminTokenMem = null; alert('كلمة المرور غير صحيحة'); }
    };
    return;
  }
  if(currentView==='ready'){
    const retryBtn = document.getElementById('retryReadyBtn');
    if(retryBtn) retryBtn.onclick = ()=>{ readySystemsError=null; render(); };
    return;
  }
  if(currentView==='products'){
    const retryBtn = document.getElementById('retryProductsBtn');
    if(retryBtn) retryBtn.onclick = ()=>{ productCatalogError=null; render(); };
    document.querySelectorAll('[data-opencat]').forEach(el=>el.onclick=()=>{
      selectedCategoryIdx = +el.dataset.opencat;
      productsNav = 'category';
      render();
    });
    const backCatsBtn = document.getElementById('backToCategoriesBtn');
    if(backCatsBtn) backCatsBtn.onclick = ()=>{ productsNav='categories'; selectedCategoryIdx=null; render(); };
    document.querySelectorAll('[data-viewmode]').forEach(b=>b.onclick=()=>{
      productViewMode = b.dataset.viewmode;
      try{ localStorage.setItem('holoul_product_view', productViewMode); }catch(e){}
      render();
    });
    const backCatBtn = document.getElementById('backToCategoryBtn');
    if(backCatBtn) backCatBtn.onclick = ()=>{ productsNav='category'; selectedProduct=null; render(); };
    const crumbAllCats = document.getElementById('crumbAllCats');
    if(crumbAllCats) crumbAllCats.onclick = ()=>{ productsNav='categories'; selectedCategoryIdx=null; selectedProduct=null; render(); };
    document.querySelectorAll('[data-viewproduct]').forEach(b=>b.onclick=()=>{
      const [ci,ri] = b.dataset.viewproduct.split(':').map(Number);
      selectedProduct = {catIdx:ci, rowIdx:ri};
      productsNav = 'detail';
      render();
    });
    const searchInput = document.getElementById('productSearch');
    if(searchInput) searchInput.oninput = e=>{
      const q = e.target.value.trim().toLowerCase();
      document.querySelectorAll('.product-category').forEach(catEl=>{
        catEl.querySelectorAll('.product-row').forEach(rowEl=>{
          const match = !q || rowEl.dataset.search.includes(q);
          rowEl.style.display = match ? '' : 'none';
        });
      });
    };
    return;
  }
  if(currentView==='portfolio'){
    const retryPfBtn = document.getElementById('retryPortfolioBtn');
    if(retryPfBtn) retryPfBtn.onclick = ()=>{ portfolioError=null; render(); };
    return;
  }
  if(currentView==='calc'){
    document.querySelectorAll('[data-calcsys]').forEach(b=>b.onclick=()=>{
      state.calcSystem = b.dataset.calcsys;
      if(state.calcSystem==='offgrid' && !cachedOffgridQuote && !offgridLoading) refreshOffgrid();
      if(state.calcSystem==='ongrid' && !cachedOngridQuote && !ongridLoading) refreshOngrid();
      render();
    });
  }
  if(currentView==='calc' && state.calcSystem==='offgrid'){
    wireOffgridCalc();
    return;
  }
  if(currentView==='calc' && state.calcSystem==='ongrid'){
    wireOngridCalc();
    return;
  }
  if(currentView==='calc' && !currentQuote()){
    const retryBtn = document.getElementById('retryLoad');
    if(retryBtn) retryBtn.onclick = ()=>refresh();
    return;
  }
  if(currentView==='calc'){
    document.getElementById('in_client').oninput = e=>{state.client=e.target.value; document.getElementById('bannerName').textContent=state.client||'—'; debouncedUpdatePrevLeadBox();};
    document.getElementById('in_phone').oninput = e=>{state.clientPhone=e.target.value; document.getElementById('bannerPhone').textContent=state.clientPhone||'—'; debouncedUpdatePrevLeadBox();};
    updatePrevLeadBox();
    const confirmHp = ()=>{ state.hp = +document.getElementById('in_hp').value || 1; scheduleRefresh(); };
    document.getElementById('hp_confirm').onclick = confirmHp;
    document.getElementById('in_hp').onkeydown = e=>{ if(e.key==='Enter') confirmHp(); };
    document.getElementById('in_panel').onchange = e=>{state.panelIdx=+e.target.value; scheduleRefresh();};
    const invBrandSel = document.getElementById('in_invbrand');
    if(invBrandSel) invBrandSel.onchange = e=>{state.inverterBrandIdx=+e.target.value; scheduleRefresh();};
    const confirmAdv = ()=>{
      state.panelsPerStringAdjust = +document.getElementById('in_pps').value || 0;
      state.stringsAdjust = +document.getElementById('in_str').value || 0;

      scheduleRefresh();

    document.getElementById('adv_confirm').onclick = confirmAdv;

    const discSel = document.getElementById('in_discount');

    const confirmSpecialDiscount = ()=>{

    const specBtn = document.getElementById('specialdiscount_confirm');
    if(specBtn) specBtn.onclick = confirmSpecialDiscount;

    const unlockBtn = document.getElementById('unlockDiscount');
    if(unlockBtn) unlockBtn.onclick = ()=>adminPasswordGate(()=>{ discountUnlocked=true; scheduleRefresh(); });
    document.querySelectorAll('[data-tgl]').forEach(c=>c.onchange=()=>{state.toggles[c.dataset.tgl]=c.checked; scheduleRefresh();});
    document.querySelectorAll('[data-preset]').forEach(b=>b.onclick=()=>{
      if(b.dataset.preset==='materials'){
        state.toggles = {panel:true, inverter:true, ip65:false, combiner:true, cables:true, mc4:true,
                          structure:false, concrete:false, earth:false, reactor:false, civilworks:false, elecworks:false, supply:false};
      } else {
        state.toggles = {panel:true, inverter:true, ip65:true, combiner:true, cables:true, mc4:true,
                          structure:true, concrete:true, earth:false, reactor:false, civilworks:true, elecworks:true, supply:true};
      }
      scheduleRefresh();
    });
    const unlockInfoBtn = document.getElementById('adminInfoTrigger');
    if(unlockInfoBtn && !adminInfoUnlocked) unlockInfoBtn.onclick = ()=>adminPasswordGate(()=>{ adminInfoUnlocked=true; scheduleRefresh(); });
    const lockInfoBtn = document.getElementById('lockAdminInfo');
    if(lockInfoBtn) lockInfoBtn.onclick = ()=>{ adminInfoUnlocked=false; render(); };
  }
  if(currentView==='feas'){
    const map = {f_psh:'psh',f_deg:'panelDegradationPct',f_gridp:'gridPrice',f_gride:'gridEscalationPct',
                 f_dp:'dieselPrice',f_dc:'dieselConsumptionPerKWh',f_de:'dieselEscalationPct',f_om:'solarOMPctOfCapex'};
    Object.keys(map).forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.oninput = ()=>{ feasOverrides[map[id]] = +el.value; render(); };
    });
  }
  if(currentView==='admin'){
    document.getElementById('addRepBtn').onclick = async ()=>{
      const username = document.getElementById('newrep_username').value.trim();
      const displayName = document.getElementById('newrep_displayname').value.trim();
      const password = document.getElementById('newrep_password').value;
      if(!username || !displayName || !password){ alert('من فضلك أدخل اسم المستخدم والاسم الظاهر وكلمة المرور'); return; }
      try{
        await callEngine('admin-save-rep', { adminToken: adminTokenMem, username, displayName, password, active:true });
        const repsData = await callEngine('admin-list-reps', { adminToken: adminTokenMem });
        adminReps = repsData.reps || [];
        render();
      }catch(e){ alert('تعذرت الإضافة: '+e.message); }
    };
    document.getElementById('saveRepsBtn').onclick = async ()=>{
      const rows = {};
      document.querySelectorAll('[data-repid]').forEach(inp=>{
        const id = inp.dataset.repid, f = inp.dataset.rf;
        rows[id] = rows[id] || {};
        rows[id][f] = f==='active' ? inp.checked : inp.value;
      });
      try{
        for(const id of Object.keys(rows)){
          const r = rows[id];
          const payload = { adminToken: adminTokenMem, id:+id, username:r.username, displayName:r.displayName, active:r.active };
          if(r.password) payload.password = r.password;
          await callEngine('admin-save-rep', payload);
        }
        const repsData = await callEngine('admin-list-reps', { adminToken: adminTokenMem });
        adminReps = repsData.reps || [];
        alert('تم حفظ تعديلات المناديب ✔');
        render();
      }catch(e){ alert('تعذر الحفظ: '+e.message); }

        });
      });
      delete adminConfig.inverters;

    if(splitBtn) splitBtn.onclick = ()=>{
      harvestAdminInputs();
      const idx = adminConfig.productCatalog.findIndex(c=>c.category.includes('إكسسوارات'));
      if(idx<0) return;
      const src = adminConfig.productCatalog[idx];
      const groups = [
        { name:'الريأكتور (Reactor)', test: n => /reactor/i.test(n) },
        { name:'صناديق التجميع (Combiner Box)', test: n => /combiner/i.test(n) },
        { name:'الكابلات والوصلات (MC4)', test: n => /mc4/i.test(n) },
        { name:'قواطع وفيوزات DC', test: n => /mccb|fuse|holder/i.test(n) },
      ];
      const newCats = groups.map(g => ({ category: g.name, categoryInfo:'', categoryImage:'', columns:[...src.columns], rows:[], productDetails:{} }));
      const leftoverRows = [];
      src.rows.forEach((row,ri)=>{
        const detail = (src.productDetails||{})[ri];
        const gi = groups.findIndex(g=>g.test(row[0]));
        if(gi>=0){
          const target = newCats[gi];
          target.rows.push(row);
          if(detail) target.productDetails[target.rows.length-1] = detail;
        } else {
          leftoverRows.push({row, detail});
        }
      });
      adminConfig.productCatalog.splice(idx, 1, ...newCats.filter(c=>c.rows.length));
      if(leftoverRows.length){
        const leftoverCat = { category: src.category, categoryInfo: src.categoryInfo||'', categoryImage: src.categoryImage||'', columns:[...src.columns], rows:[], productDetails:{} };
        leftoverRows.forEach(({row,detail})=>{
          leftoverCat.rows.push(row);
          if(detail) leftoverCat.productDetails[leftoverCat.rows.length-1] = detail;
        });
        adminConfig.productCatalog.push(leftoverCat);
      }
      render();
      alert('تم التقسيم — راجع الفئات الجديدة واضغط "حفظ التعديلات" لتثبيتها.');
    };

      if(!confirm(`هيتم زيادة كل الأسعار في كل الفئات بنسبة ${pct}%. متأكد؟`)) return;
      harvestAdminInputs();
      adminConfig.productCatalog.forEach(cat=>{
        const priceCols = cat.columns.map((c,i)=>c.includes('السعر')?i:-1).filter(i=>i>=0);
        cat.rows.forEach(row=>{
          priceCols.forEach(ci=>{
            const num = parseFloat(String(row[ci]).replace(/[^\d.]/g,''));
            if(!isNaN(num)){
              const updated = num * (1 + pct/100);
              row[ci] = Number.isInteger(num) && Number.isInteger(updated) ? String(Math.round(updated)) : updated.toFixed(2);
            }
          });
        });
      });
      render();
      alert('تم تحديث الأسعار في الجدول — راجعها واضغط "حفظ التعديلات" لتثبيتها.');

    function readFileAsBase64(file){
      return new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = ()=>resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    async function uploadImage(file){
      const imageBase64 = await readFileAsBase64(file);
      const data = await callEngine('upload-product-image', { adminToken: adminTokenMem, imageBase64, filename: file.name });
      return data.url;
    }
    document.querySelectorAll('[data-catimg]').forEach(inp=>inp.onchange = async ()=>{
      const file = inp.files[0]; if(!file) return;
      harvestAdminInputs();
      try{

        adminConfig.productCatalog[+inp.dataset.catimg].categoryImage = url;
        render();
      }catch(e){ alert('تعذر رفع الصورة: '+e.message); }

    document.querySelectorAll('[data-editdetail]').forEach(b=>b.onclick=()=>{
      const [ci,ri] = b.dataset.editdetail.split(':').map(Number);
      const cat = adminConfig.productCatalog[ci];
      const detail = (cat.productDetails && cat.productDetails[ri]) || {};
      document.getElementById('pde_target').value = `${ci}:${ri}`;
      document.getElementById('pde_description').value = detail.description || '';
      document.getElementById('pde_specs').value = Object.entries(detail.specs||{}).map(([k,v])=>`${k}: ${v}`).join('\n');
      document.getElementById('pde_available').checked = detail.available !== false;
      const preview = document.getElementById('pde_imgpreview');
      delete preview.dataset.uploadedUrl;
      if(detail.image){ preview.src = detail.image; preview.style.display='inline-block'; } else { preview.style.display='none'; preview.src=''; }
      document.getElementById('productDetailEditor').style.display = 'block';
      const editorEl = document.getElementById('productDetailEditor');
      if(editorEl.scrollIntoView){ try{ editorEl.scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){} }
    });
    document.getElementById('pde_imgfile').onchange = async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      try{
        const url = await uploadImage(file);
        const preview = document.getElementById('pde_imgpreview');
        preview.src = url; preview.style.display='inline-block';
        preview.dataset.uploadedUrl = url;
      }catch(err){ alert('تعذر رفع الصورة: '+err.message); }
    };
    document.getElementById('pde_apply').onclick = ()=>{
      harvestAdminInputs();
      const [ci,ri] = document.getElementById('pde_target').value.split(':').map(Number);
      const cat = adminConfig.productCatalog[ci];
      cat.productDetails = cat.productDetails || {};
      const specs = {};
      document.getElementById('pde_specs').value.split('\n').forEach(line=>{
        const idx = line.indexOf(':');
        if(idx>0){ specs[line.slice(0,idx).trim()] = line.slice(idx+1).trim(); }
      });
      const preview = document.getElementById('pde_imgpreview');
      cat.productDetails[ri] = {
        image: preview.dataset.uploadedUrl || (preview.style.display!=='none' ? preview.src : (cat.productDetails[ri]||{}).image) || '',
        description: document.getElementById('pde_description').value,
        available: document.getElementById('pde_available').checked,
        specs
      };
      document.getElementById('productDetailEditor').style.display = 'none';
      render();
    };
    document.getElementById('pde_cancel').onclick = ()=>{
      document.getElementById('productDetailEditor').style.display = 'none';
    };
    document.getElementById('pde_useForOthers').onclick = ()=>{
      const preview = document.getElementById('pde_imgpreview');
      const imgUrl = preview.dataset.uploadedUrl || (preview.style.display!=='none' ? preview.src : '');
      if(!imgUrl){ alert('ارفع صورة أولاً قبل ما تشاركها مع موديلات تانية'); return; }
      const [ci,ri] = document.getElementById('pde_target').value.split(':').map(Number);
      const cat = adminConfig.productCatalog[ci];
      const list = document.getElementById('sharedImagePickerList');
      list.innerHTML = cat.rows.map((row,i)=>i===ri?'':`
        <label style="display:flex;align-items:center;gap:8px;padding:4px 0">
          <input type="checkbox" data-sip-row="${i}" style="width:auto">
          <span>${row[0]}</span>
        </label>`).join('');
      document.getElementById('sharedImagePicker').dataset.cat = ci;
      document.getElementById('sharedImagePicker').dataset.img = imgUrl;
      document.getElementById('sharedImagePicker').dataset.sourceRow = ri;
      document.getElementById('sharedImagePicker').style.display = 'block';
    };
    document.getElementById('sip_apply').onclick = ()=>{
      const picker = document.getElementById('sharedImagePicker');
      const ci = +picker.dataset.cat;
      const imgUrl = picker.dataset.img;
      const sourceRow = +picker.dataset.sourceRow;
      const cat = adminConfig.productCatalog[ci];
      cat.productDetails = cat.productDetails || {};
      // the model you started from always gets the image too
      cat.productDetails[sourceRow] = { ...(cat.productDetails[sourceRow]||{}), image: imgUrl };
      let count = 1;
      picker.querySelectorAll('[data-sip-row]:checked').forEach(cb=>{
        const ri = +cb.dataset.sipRow;
        cat.productDetails[ri] = { ...(cat.productDetails[ri]||{}), image: imgUrl };
        count++;
      });
      picker.style.display = 'none';
      document.getElementById('productDetailEditor').style.display = 'none';
      alert(`تم تطبيق الصورة على ${count} موديل. اضغط "حفظ التعديلات" لتثبيتها.`);
      render();
    };
    document.getElementById('sip_cancel').onclick = ()=>{
      document.getElementById('sharedImagePicker').style.display = 'none';
    };
    document.getElementById('admExport').onclick = ()=>{
      const blob = new Blob([JSON.stringify(adminConfig,null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='holoul-pricing-data.json'; a.click();
    };
    document.getElementById('admImportBtn').onclick = ()=>document.getElementById('admImport').click();
    document.getElementById('admImport').onchange = e=>{
      const file=e.target.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload = ()=>{
        try{ adminConfig = normalizeAdminConfig(JSON.parse(reader.result)); render(); alert('تم الاستيراد — اضغط "حفظ التعديلات" لتثبيته على الخادم ✔'); }
        catch(err){ alert('ملف غير صالح'); }
      };
      reader.readAsText(file);
    };
  }
}

function wireOffgridCalc(){
  const retryBtn = document.getElementById('retryLoadOffgrid');
  if(retryBtn){ retryBtn.onclick = ()=>refreshOffgrid(); return; }
  const o = state.offgrid;
  const clientEl = document.getElementById('og_client');
  if(clientEl) clientEl.oninput = e=>{ state.client=e.target.value; const b=document.getElementById('bannerName'); if(b) b.textContent=state.client||'—'; };
  const phoneEl = document.getElementById('og_phone');
  if(phoneEl) phoneEl.oninput = e=>{ state.clientPhone=e.target.value; const b=document.getElementById('bannerPhone'); if(b) b.textContent=state.clientPhone||'—'; };
  document.querySelectorAll('[data-ogmethod]').forEach(b=>b.onclick=()=>{ o.method=b.dataset.ogmethod; scheduleRefreshOffgrid(0); });
  const dailyEl = document.getElementById('og_dailykwh');
  if(dailyEl) dailyEl.oninput = e=>{ o.dailyKwh = +e.target.value || 0; scheduleRefreshOffgrid(); };
  const autoEl = document.getElementById('og_autonomy');
  if(autoEl) autoEl.oninput = e=>{ o.autonomyDays = +e.target.value || 1; scheduleRefreshOffgrid(); };
  const panelEl = document.getElementById('og_panel');
  if(panelEl) panelEl.onchange = e=>{ o.panelIdx = +e.target.value; scheduleRefreshOffgrid(); };
  document.querySelectorAll('[data-ogapp]').forEach(inp=>{
    inp.oninput = ()=>{
      const i = +inp.dataset.ogapp, f = inp.dataset.af;
      o.appliances[i][f] = (f==='name') ? inp.value : (+inp.value||0);
      scheduleRefreshOffgrid();
    };
  });
  document.querySelectorAll('[data-ogdelapp]').forEach(b=>b.onclick=()=>{
    o.appliances.splice(+b.dataset.ogdelapp,1); scheduleRefreshOffgrid(0);
  });
  const addBtn = document.getElementById('ogAddAppliance');
  if(addBtn) addBtn.onclick = ()=>{ o.appliances.push({name:'جهاز جديد',watts:100,hours:4,qty:1}); scheduleRefreshOffgrid(0); };
  const unlockInfoBtn = document.getElementById('adminInfoTrigger');
  if(unlockInfoBtn && !adminInfoUnlocked) unlockInfoBtn.onclick = ()=>adminPasswordGate(()=>{ adminInfoUnlocked=true; scheduleRefreshOffgrid(0); });
}

function wireOngridCalc(){
  const retryBtn = document.getElementById('retryLoadOngrid');
  if(retryBtn){ retryBtn.onclick = ()=>refreshOngrid(); return; }
  const n = state.ongrid;
  const clientEl = document.getElementById('ng_client');
  if(clientEl) clientEl.oninput = e=>{ state.client=e.target.value; const b=document.getElementById('bannerName'); if(b) b.textContent=state.client||'—'; };
  const phoneEl = document.getElementById('ng_phone');
  if(phoneEl) phoneEl.oninput = e=>{ state.clientPhone=e.target.value; const b=document.getElementById('bannerPhone'); if(b) b.textContent=state.clientPhone||'—'; };
  document.querySelectorAll('[data-ngmethod]').forEach(b=>b.onclick=()=>{ n.method=b.dataset.ngmethod; scheduleRefreshOngrid(0); });
  const billEl = document.getElementById('ng_bill');
  if(billEl) billEl.oninput = e=>{ n.billSar = +e.target.value || 0; scheduleRefreshOngrid(); };
  const kwhEl = document.getElementById('ng_kwh');
  if(kwhEl) kwhEl.oninput = e=>{ n.monthlyKwh = +e.target.value || 0; scheduleRefreshOngrid(); };
  const kwEl = document.getElementById('ng_kw');
  if(kwEl) kwEl.oninput = e=>{ n.systemKw = +e.target.value || 0; scheduleRefreshOngrid(); };
  const panelEl = document.getElementById('ng_panel');
  if(panelEl) panelEl.onchange = e=>{ n.panelIdx = +e.target.value; scheduleRefreshOngrid(); };
  const unlockInfoBtn = document.getElementById('adminInfoTrigger');
  if(unlockInfoBtn && !adminInfoUnlocked) unlockInfoBtn.onclick = ()=>adminPasswordGate(()=>{ adminInfoUnlocked=true; scheduleRefreshOngrid(0); });
}

});

function showRepBadge(){
  const badge = document.getElementById('repNameBadge');
  const logoutBtn = document.getElementById('repLogoutBtn');
  const productsBtn = document.getElementById('productsNavBtn');
  // products tab is public — visible to everyone regardless of login state
  if(repAuthed && repDisplayName){
    badge.textContent = '👤 ' + repDisplayName;
    badge.style.display = 'inline';
    logoutBtn.style.display = 'inline-block';
  } else if(guestMode){
    badge.textContent = '🖥️ تسعير مباشر (بدون مندوب)';
    badge.style.display = 'inline';
    logoutBtn.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
    logoutBtn.style.display = 'none';
  }
}
document.getElementById('repLogoutBtn').onclick = ()=>{
  repAuthed = false; repUsername = null; repTokenMem = null; repDisplayName = null;
  guestMode = false; guestRegistered = false;
  sessionStorage.removeItem('holoul_rep_session');
  state.client = ''; state.clientPhone = '';
  showRepBadge();
  render();
};

async function refresh(){
  quoteLoading = true;
  render();

  quoteLoading = false;

}

function scheduleRefresh(delay = 220){
  if(refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(()=>{
    refreshTimer = null;
    refresh();
  }, delay);
}

async function refreshOffgrid(){
  offgridLoading = true;

  offgridLoading = false;

function scheduleRefreshOffgrid(delay = 220){

async function refreshOngrid(){

let refreshOngridTimer = null;
function scheduleRefreshOngrid(delay = 220){

}

refresh();
