<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة عروض أسعار محطات الطاقة الشمسية | حلول الطاقة المتجددة والمقاولات - HoloulEnergy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#122436;
  --night:#0D3452;
  --night-2:#155E85;
  --teal:#0FA98D;
  --teal-dark:#0B7A66;
  --teal-tint:#E7F8F4;
  --sun:#E7AC12;
  --sun-2:#F3CB56;
  --sun-tint:#FCF3DE;
  --sand:#F6F8F7;
  --card:#FFFFFF;
  --line:#DEE7E4;
  --muted:#63736F;
  --good:#0FA98D;
  --bad:#B0432C;
  --shadow:0 1px 3px rgba(13,52,82,.07), 0 1px 2px rgba(13,52,82,.05);
  --radius:14px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--sand);color:var(--ink);font-family:'Cairo',sans-serif;}
h1,h2,h3,.disp{font-family:'Cairo',sans-serif;}
.num{font-family:'Cairo',sans-serif;font-variant-numeric:tabular-nums;font-weight:600;}

/* header */
header.top{background:#FFFFFF;color:var(--ink);padding:18px 28px;position:relative;overflow:hidden;border-bottom:1px solid var(--line);box-shadow:0 1px 3px rgba(13,52,82,.05);}
header.top::before{content:"";position:absolute;left:-60px;top:-90px;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,var(--sun-tint),transparent 70%);opacity:.9;}
header.top::after{content:"";position:absolute;right:-40px;bottom:-90px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle at 60% 40%,var(--teal-tint),transparent 70%);opacity:.8;}
.brandrow{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2;flex-wrap:wrap;gap:14px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand .mark{width:46px;height:46px;border-radius:11px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;padding:4px;box-shadow:var(--shadow);}
.brand .mark img{width:100%;height:100%;object-fit:contain;}
.brand .name{font-family:'Cairo',sans-serif;font-weight:800;font-size:20px;color:var(--night);}
.brand .sub{font-size:12px;color:var(--muted);margin-top:2px;}
nav.tabs{display:flex;gap:6px;background:var(--sand);padding:5px;border-radius:12px;border:1px solid var(--line);}
nav.tabs button{background:transparent;border:0;color:var(--ink);padding:9px 16px;border-radius:9px;font-family:'Cairo',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:.15s;}
nav.tabs button.active{background:var(--sun);color:var(--night);}
nav.tabs button:not(.active):hover{background:#fff;}

main{max-width:1280px;margin:0 auto;padding:26px 20px 70px;}
section.view{display:none;}
section.view.active{display:block;}

.grid2{display:grid;grid-template-columns:380px 1fr;gap:22px;align-items:start;}
@media (max-width:960px){.grid2{grid-template-columns:1fr;}}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:18px;box-shadow:var(--shadow);}
.card h3{margin:0 0 14px;font-size:16px;display:flex;align-items:center;gap:9px;}
.card h3::before{content:"";width:4px;height:16px;border-radius:3px;background:linear-gradient(180deg,var(--teal),var(--sun));display:inline-block;}
.card h3 .tag{font-size:11px;background:var(--sand);border:1px solid var(--line);color:var(--muted);padding:2px 8px;border-radius:20px;font-family:'Cairo';font-weight:500;}

label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;font-weight:500;}
label:first-child{margin-top:0;}
input[type=text],input[type=number],select{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;
  font-family:'Cairo';background:#fff;color:var(--ink);transition:border-color .15s,box-shadow .15s;
}
input[type=number]{font-family:'Cairo';}
input:focus,select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.seg button{flex:1;padding:9px;border:0;background:#fff;cursor:pointer;font-family:'Cairo';font-weight:600;font-size:13px;color:var(--muted);}
.seg button.active{background:var(--night);color:#fff;}

.toggles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
.tgl{display:flex;align-items:center;gap:8px;background:var(--sand);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12.5px;cursor:pointer;user-select:none;transition:background .15s,border-color .15s;}
.tgl:has(input:checked){background:var(--teal-tint);border-color:var(--teal);}
.tgl input{margin:0;accent-color:var(--teal);}

details.adv{margin-top:14px;border-top:1px dashed var(--line);padding-top:10px;}
details.adv summary{cursor:pointer;font-size:13px;color:var(--night-2);font-weight:600;}

/* results */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:4px;}
.stat{background:var(--sand);border:1px solid var(--line);border-inline-end:3px solid var(--teal);border-radius:11px;padding:12px 14px;}
.stat .v{font-family:'Cairo';font-size:19px;font-weight:600;color:var(--night);}
.stat .l{font-size:11.5px;color:var(--muted);margin-top:3px;}

table.bom{width:100%;border-collapse:collapse;font-size:13px;}
table.bom th{text-align:right;color:var(--muted);font-weight:600;font-size:11.5px;padding:8px 8px;border-bottom:2px solid var(--night);}
table.bom td{padding:9px 8px;border-bottom:1px solid #EFEBE0;}
table.bom tr.off td{opacity:.35;}
table.bom tr:hover td{background:var(--sand);}
table.bom td.num,table.bom th.num{font-family:'Cairo';text-align:left;}

.totalbar{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(120deg,var(--night) 0%,var(--night-2) 85%,#1A6A87 100%);color:#fff;border-radius:12px;padding:16px 20px;margin-top:14px;flex-wrap:wrap;gap:10px;}
.totalbar .big{font-family:'Cairo',sans-serif;font-weight:800;font-size:26px;color:var(--sun-2);}
.totalbar .lbl{font-size:12px;color:#BFE3D6;}

.pay3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
.pay3 div{text-align:center;padding:4px 6px;}
.pay3 .p{font-weight:600;font-size:13px;color:var(--ink);}
.pay3 .l{font-size:10px;color:var(--muted);margin-top:2px;}

.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--sun-2),var(--sun));color:var(--night);border:0;padding:11px 18px;border-radius:10px;font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 2px 6px rgba(231,172,18,.3);transition:transform .1s,box-shadow .15s;}
.btn:hover{box-shadow:0 3px 10px rgba(231,172,18,.4);transform:translateY(-1px);}
.btn.ghost{background:transparent;border:1px solid var(--teal);color:var(--teal-dark);box-shadow:none;}
.btn.ghost:hover{background:var(--teal-tint);transform:none;}
.btn.small{padding:7px 12px;font-size:12.5px;}
.btn.danger{background:#F4E4E0;color:var(--bad);box-shadow:none;}

.note{font-size:12px;color:var(--muted);line-height:1.7;background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}

/* admin */
.admtable{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:10px;}
.admtable th{font-size:11px;color:var(--muted);text-align:right;padding:6px;}
.admtable td{padding:5px;}
.admtable input{padding:6px 8px;font-size:12.5px;}
.admtable td.op{width:34px;text-align:center;}

.product-category table.admtable thead th{
  position:sticky;top:0;background:#fff;z-index:2;
  box-shadow:0 1px 0 var(--line);
  font-size:12px;padding:8px 6px;color:var(--ink);font-weight:700;
}
.product-category table.admtable td.num{font-family:'Cairo';text-align:left;white-space:nowrap;}

.assump{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}

svg.chart{width:100%;height:260px;}
.reload-badge{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:999;background:var(--night);color:#fff;padding:8px 16px;border-radius:20px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(13,52,82,.25);animation:fadeIn .15s ease-out;}
.reload-badge .spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-6px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.quote-loading{opacity:.55;pointer-events:none;transition:opacity .12s;}

footer.foot{text-align:center;color:var(--muted);font-size:12px;padding:24px;}

@page{ size:A4; margin:9mm; }
@media print{
  header.top,.no-print,footer.foot{display:none!important;}
  body{background:#fff;font-size:11px!important;line-height:1.42!important;}
  main{padding:0!important;max-width:100%!important;}
  .grid2{grid-template-columns:1fr!important;gap:8px!important;display:block!important;}
  .card{border:1px solid #ddd!important;box-shadow:none!important;padding:7px 14px!important;margin-bottom:6px!important;border-radius:8px!important;}
  table.bom thead{display:table-header-group;}
  table.bom tr{page-break-inside:avoid;}
  .totalbar,.pay3{page-break-inside:avoid;}
  .card h3{font-size:13px!important;margin:0 0 8px!important;}
  .card h3::before{height:14px!important;}
  .card h3 .tag{display:none!important;}
  .quote-banner{padding:10px 14px!important;}
  #bannerName{font-size:14px!important;}
  #bannerPhone{font-size:11px!important;}
  .stats{grid-template-columns:repeat(6,1fr)!important;gap:6px!important;}
  .stat{padding:6px 7px!important;background:#F7F8F7!important;}
  .stat .v{font-size:13px!important;}
  .stat .l{font-size:9px!important;}
  table.bom{font-size:11px!important;}
  table.bom th{font-size:9.5px!important;padding:5px 6px!important;}
  table.bom td{padding:6px 6px!important;}
  .totalbar{padding:10px 16px!important;margin-top:8px!important;border-radius:10px!important;}
  .totalbar .big{font-size:22px!important;}
  .totalbar .lbl{font-size:11px!important;}
  .pay3{margin-top:8px!important;gap:6px!important;}
  .pay3 div{padding:8px!important;}
  .pay3 .p{font-size:12px!important;}
  .pay3 .l{font-size:9.5px!important;}
  .note{font-size:10.5px!important;padding:8px 10px!important;}
  .legal-note{font-size:10px!important;line-height:1.5!important;margin-top:9px!important;}
  .support-note{font-size:10.5px!important;padding:6px 12px!important;margin-top:7px!important;}
  .contact-note{font-size:10px!important;line-height:1.5!important;margin-top:9px!important;}
}
/* Mirrors the @media print block above exactly (same values), so the
   PDF generated for WhatsApp sharing (downloadQuotePdf) looks identical
   to what comes out of the browser's own Print/Save-as-PDF. Applied via
   JS by adding the "pdf-compact" class to the cloned print area before
   capture — kept in sync manually with @media print above. */
.pdf-compact{font-size:11px;line-height:1.5;}
.pdf-compact .grid2{grid-template-columns:1fr!important;gap:8px!important;display:block!important;}
.pdf-compact .card{border:1px solid #ddd!important;box-shadow:none!important;padding:7px 14px!important;margin-bottom:6px!important;border-radius:8px!important;}
.pdf-compact .card h3{font-size:13px!important;margin:0 0 8px!important;}
.pdf-compact .card h3::before{height:14px!important;}
.pdf-compact .card h3 .tag{display:none!important;}
.pdf-compact .quote-banner{padding:10px 14px!important;}
.pdf-compact #bannerName{font-size:14px!important;}
.pdf-compact #bannerPhone{font-size:11px!important;}
.pdf-compact .stats{grid-template-columns:repeat(6,1fr)!important;gap:6px!important;}
.pdf-compact .stat{padding:6px 7px!important;background:#F7F8F7!important;}
.pdf-compact .stat .v{font-size:13px!important;}
.pdf-compact .stat .l{font-size:9px!important;}
.pdf-compact table.bom{font-size:11px!important;}
.pdf-compact table.bom th{font-size:9.5px!important;padding:5px 6px!important;}
.pdf-compact table.bom td{padding:6px 6px!important;}
.pdf-compact .totalbar{padding:10px 16px!important;margin-top:8px!important;border-radius:10px!important;}
.pdf-compact .totalbar .big{font-size:22px!important;}
.pdf-compact .totalbar .lbl{font-size:11px!important;}
.pdf-compact .pay3{margin-top:8px!important;gap:6px!important;}
.pdf-compact .pay3 div{padding:8px!important;}
.pdf-compact .pay3 .p{font-size:12px!important;}
.pdf-compact .pay3 .l{font-size:9.5px!important;}
.pdf-compact .note{font-size:10.5px!important;padding:8px 10px!important;}
.pdf-compact .legal-note{font-size:10px!important;line-height:1.5!important;margin-top:9px!important;}
.pdf-compact .support-note{font-size:10.5px!important;padding:6px 12px!important;margin-top:7px!important;}
.pdf-compact .contact-note{font-size:10px!important;line-height:1.5!important;margin-top:9px!important;}
</style>
</head>

/* =======================================================================
   1) SUPABASE — server-side pricing engine (no rates/costs live in this file)
   ======================================================================= */
const SUPABASE_URL = 'https://xhgwvszdatqlvlgqiikj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_4qWmgl6fWMpoU6F_o__ykg_Z0Xy_aJY';
const EDGE_FN = SUPABASE_URL + '/functions/v1/compute-quote';

async function callEngine(action, payload){
  const res = await fetch(EDGE_FN, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'apikey': SUPABASE_ANON_KEY
    },
    body: JSON.stringify({ action, ...payload })
  });
  let data;
  try{ data = await res.json(); }catch(e){ throw new Error('استجابة غير صالحة من الخادم'); }
  if(!res.ok) throw new Error(data.error || 'خطأ في الخادم');
  return data;
}

/* =======================================================================
   2) CLIENT-SIDE CACHE — populated by refreshQuote(); never holds cost/margin
   ======================================================================= */
let cachedQuote = null;       // public quote (sell prices only)
let cachedFeas = null;        // general feasibility-study assumptions (non-sensitive)
let cachedPanelOptions = [];  // [{brand,power}] — never priceW
let cachedInverterBrandOptions = []; // [{idx,brand}] — never list/cost/discount
let cachedProductCatalog = null; // fetched lazily when the products tab opens
let productCatalogLoading = false;
let productCatalogError = null;
let adminFinancials = null;   // cost/margin breakdown — only after admin auth
let adminConfig = null;       // full rates object — only after admin auth
let adminReps = [];           // rep accounts — only after admin auth
let adminPasswordMem = null;  // held in memory only; lost on page reload
let engineError = null;
let quoteLoading = false;

function buildEngineInput(){
  return {
    panelIdx: state.panelIdx,
    inverterBrandIdx: state.inverterBrandIdx,
    hp: state.hp,
    structureType: 'FIXED',
    discountTierIdx: discountUnlocked ? state.discountOverrideIdx : null,
    specialDiscountAmt: state.specialDiscountAmt,
    panelsPerStringAdjust: state.panelsPerStringAdjust,
    stringsAdjust: state.stringsAdjust,
    inverterPowerIncrease: state.inverterPowerIncrease,
    toggles: state.toggles
  };
}

async function refreshQuote(){
  engineError = null;
  const input = buildEngineInput();
  // Run the public quote and (if needed) the admin financials call in
  // parallel instead of one-after-the-other — halves the wait when the
  // admin panel is open, since both round-trips happen at the same time.
  const quotePromise = callEngine('quote', { input });
  const adminPromise = (adminInfoUnlocked && adminPasswordMem)
    ? callEngine('admin-view', { adminPassword: adminPasswordMem, input }).catch(()=>{ adminInfoUnlocked = false; return null; })
    : Promise.resolve(null);
  try{
    const [data, adminData] = await Promise.all([quotePromise, adminPromise]);
    cachedQuote = data.quote;
    cachedFeas = data.feas;
    cachedPanelOptions = data.panelOptions;
    cachedInverterBrandOptions = data.inverterBrandOptions || [];
    adminFinancials = adminData ? adminData.quote : null;
    let needsRetry = false;
    if(!cachedPanelOptions.some(p=>p.idx===state.panelIdx) && cachedPanelOptions.length){
      state.panelIdx = cachedPanelOptions[0].idx; needsRetry = true;
    }
    if(!cachedInverterBrandOptions.some(b=>b.idx===state.inverterBrandIdx) && cachedInverterBrandOptions.length){
      state.inverterBrandIdx = cachedInverterBrandOptions[0].idx; needsRetry = true;
    }
    if(needsRetry){
      const retryData = await callEngine('quote', { input: buildEngineInput() });
      cachedQuote = retryData.quote;
    }
  }catch(e){
    engineError = e.message || 'تعذر الاتصال بالخادم';
  }
}

function logLead(lead){

/* IRR via bisection on a cash-flow array where cf[0] is the year-0 outlay */
function irr(cf){
  function npv(r){ return cf.reduce((s,c,i)=>s + c/Math.pow(1+r,i), 0); }
  let lo=-0.9, hi=5, mid;
  if(npv(lo)*npv(hi) > 0) return null;
  for(let i=0;i<100;i++){
    mid=(lo+hi)/2;
    if(npv(lo)*npv(mid) <= 0) hi=mid; else lo=mid;
  }
  return mid;
}

function computeFeasibility(capex, calcKW, opt){
  const f = {...cachedFeas, ...opt};
  const baseGen = calcKW*f.psh*365;
  const years = f.years;
  const genArr=[], gridArr=[], dieselArr=[];
  let cumGrid=-capex, cumDiesel=-capex, paybackGrid=null, paybackDiesel=null;
  const cfGrid=[-capex], cfDiesel=[-capex];
  const omYear = capex*f.solarOMPctOfCapex/100;
  for(let y=1;y<=years;y++){
    const gen = baseGen*Math.pow(1-f.panelDegradationPct/100, y-1);
    const gridVal = gen*f.gridPrice*Math.pow(1+f.gridEscalationPct/100, y-1);
    const dieselVal = gen*f.dieselConsumptionPerKWh*f.dieselPrice*Math.pow(1+f.dieselEscalationPct/100, y-1);
    const om = y===1?0:omYear;
    const netGrid = gridVal-om, netDiesel = dieselVal-om;
    genArr.push(gen); gridArr.push(netGrid); dieselArr.push(netDiesel);
    cfGrid.push(netGrid); cfDiesel.push(netDiesel);
    cumGrid+=netGrid; cumDiesel+=netDiesel;
    if(paybackGrid===null && cumGrid>=0) paybackGrid = y-1 + (netGrid-cumGrid)/netGrid;
    if(paybackDiesel===null && cumDiesel>=0) paybackDiesel = y-1 + (netDiesel-cumDiesel)/netDiesel;
  }
  const litersYear1 = genArr[0]*f.dieselConsumptionPerKWh;
  const co2Year1 = litersYear1*f.co2FactorKgPerLiter/1000;
  return {
    genArr, gridArr, dieselArr,
    paybackGrid, paybackDiesel,
    irrGrid: irr(cfGrid), irrDiesel: irr(cfDiesel),
    profit30Grid: cfGrid.reduce((a,b)=>a+b,0),
    profit30Diesel: cfDiesel.reduce((a,b)=>a+b,0),
    litersYear1, co2Year1, cfGrid, cfDiesel
  };
}

// html2pdf.js clones the element AGAIN internally before rendering it
// (a documented bug in the library). That second, detached clone can fail
// to resolve CSS custom properties (var(--ink), var(--card), var(--line)...)
// which this app uses everywhere for colors — the result would be borders
// showing up while all text/fills come out white/blank. To avoid this
// entirely, and to avoid the internal re-clone breaking Arabic RTL/bidi
// text (fused words, scrambled digits), we bypass html2pdf.js and use
// html2canvas + jsPDF directly on our OWN clone, which stays attached to
// the live document (correct dir="rtl", fonts, styles) the whole time.

// "Flatten" every resolved color onto the clone as a literal inline style
// (e.g. color:rgb(21,42,56)) BEFORE capture, so there is no var() left
// that anything could fail to resolve.
const FLATTEN_PROPS = [
  'color','backgroundColor',
  'borderTopColor','borderRightColor','borderBottomColor','borderLeftColor'
];
function flattenComputedColors(liveRoot, cloneRoot){
  const liveEls = [liveRoot, ...liveRoot.querySelectorAll('*')];
  const cloneEls = [cloneRoot, ...cloneRoot.querySelectorAll('*')];
  liveEls.forEach((liveEl, i)=>{
    const cloneEl = cloneEls[i];
    if(!cloneEl) return;
    const cs = getComputedStyle(liveEl);
    FLATTEN_PROPS.forEach(prop=>{ cloneEl.style[prop] = cs[prop]; });
  });
}

// Picks a safe html2canvas scale per device. Mobile/tablet browsers
// (especially iOS Safari and in-app webviews like WhatsApp) silently
// return a BLANK canvas when the rendered pixel area is too large, so we
// cap the scale more conservatively there than on desktop/laptop.
function getCaptureScale(){
  const ua = navigator.userAgent || '';
  const isTablet = /iPad|Tablet/i.test(ua) || (/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1);
  const isMobile = /iPhone|iPod|Android/i.test(ua) && !isTablet;
  const dpr = window.devicePixelRatio || 1;
  if(isMobile) return Math.max(1, Math.min(dpr, 1.5));
  if(isTablet) return Math.max(1, Math.min(dpr, 1.75));
  return Math.max(1, Math.min(dpr, 2)) || 2;
}

async function downloadQuotePdf(filename){
  const src = document.getElementById('quotePrintArea');
  if(!src || typeof html2canvas==='undefined') return false;
  const clone = src.cloneNode(true);

  // Flatten colors BEFORE removing .no-print nodes, so the live/clone
  // element lists still line up 1:1 in the same order.
  flattenComputedColors(src, clone);
  clone.querySelectorAll('.no-print').forEach(el=>el.remove());
  // Use the exact same compact layout/typography as the browser's own
  // Print/Save-as-PDF (@media print), so both outputs look identical.
  clone.classList.add('pdf-compact');

  const CAPTURE_WIDTH = 760;
  clone.style.maxWidth = CAPTURE_WIDTH+'px';
  clone.style.width = CAPTURE_WIDTH+'px';
  clone.style.backgroundColor = '#ffffff';
  // Force the correct text direction/language explicitly on the clone
  // itself, since it's what keeps Arabic word-joining and bidi digit
  // order correct.
  clone.setAttribute('dir','rtl');
  clone.setAttribute('lang','ar');

  // IMPORTANT: keep the clone inside the viewport's coordinate space
  // (top:0; left:0) instead of pushing it far off-screen (e.g. left:-9999px).
  // Many mobile/tablet browsers (iOS Safari, Chrome/WhatsApp webviews) skip
  // painting fixed-position content placed outside the visible viewport
  // bounds, which produces a fully white/blank PDF. Using a very low
  // z-index keeps it invisible behind the real page instead.
  const wrapper = document.createElement('div');
  wrapper.setAttribute('dir','rtl');
  wrapper.style.cssText = [
    'position:fixed',
    'top:0',
    'left:0',
    'z-index:-9999',
    'pointer-events:none',
    'background:#fff',
    'padding:14px',
    `width:${CAPTURE_WIDTH+28}px`,
    'overflow:visible'
  ].join(';');
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  // Give mobile browsers a couple of frames to actually lay out and paint
  // the clone before html2canvas snapshots it (fixes intermittent blanks
  // on phones/tablets where layout isn't ready on the very next tick).
  await new Promise(resolve=>requestAnimationFrame(()=>requestAnimationFrame(resolve)));

  try{
    const canvas = await html2canvas(clone, {
      scale: getCaptureScale(),
      useCORS: true,
      backgroundColor: '#ffffff',
      windowWidth: CAPTURE_WIDTH+28,
      windowHeight: Math.max(wrapper.scrollHeight, clone.scrollHeight)
    });

    const JsPdfCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
    if(!JsPdfCtor) throw new Error('jsPDF not available');

    // Build the PDF ourselves so we can force everything onto ONE A4 page
    // (shrink-to-fit) instead of letting content spill onto a second page.
    const pdf = new JsPdfCtor({unit:'mm', format:'a4', orientation:'portrait'});
    const pageW = 210, pageH = 297, margin = 8;
    const usableW = pageW - margin*2, usableH = pageH - margin*2;
    // PNG (lossless) instead of JPEG: avoids compression artifacts around
    // small text/numbers in the pricing table, which is what matters most
    // here — a client must be able to read every figure without ambiguity.
    const imgData = canvas.toDataURL('image/png');
    const imgRatio = canvas.height / canvas.width;

    let drawW = usableW;
    let drawH = drawW * imgRatio;
    if(drawH > usableH){
      // Content is taller than one page at full width — shrink further so
      // the whole thing still fits within a single A4 page.
      drawH = usableH;
      drawW = drawH / imgRatio;
    }
    const x = margin + (usableW - drawW)/2;
    const y = margin + (usableH - drawH)/2;

    pdf.addImage(imgData, 'PNG', x, y, drawW, drawH);
    pdf.save(filename);
    return true;
  }catch(err){
    console.error('PDF generation failed', err);
    return false;
  }finally{
    document.body.removeChild(wrapper);
  }
}

function buildChart(cfGrid, cfDiesel){
  const cumG=[], cumD=[]; let cg=0, cd=0;
  cfGrid.forEach(v=>{cg+=v; cumG.push(cg);});
  cfDiesel.forEach(v=>{cd+=v; cumD.push(cd);});
  const W=900,H=240,pad=36;
  const allVals=[...cumG,...cumD];
  const maxV=Math.max(...allVals), minV=Math.min(...allVals,0);
  const n=cumG.length;
  const x=i=>pad+(W-2*pad)*i/(n-1);
  const y=v=>H-pad-(H-2*pad)*(v-minV)/(maxV-minV||1);
  const path=arr=>arr.map((v,i)=>`${i===0?'M':'L'}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const zeroY=y(0);
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${pad}" y1="${zeroY}" x2="${W-pad}" y2="${zeroY}" stroke="#C9C4B4" stroke-width="1" stroke-dasharray="4 4"/>
    <path d="${path(cumD)}" fill="none" stroke="#103959" stroke-width="2.5"/>
    <path d="${path(cumG)}" fill="none" stroke="#EAB515" stroke-width="2.5"/>
  </svg>`;
}

  `;
}

async function loadProductCatalog(){
  productCatalogLoading = true;
  productCatalogError = null;
  try{
    const data = await callEngine('get-product-catalog', { username: repUsername, password: repPasswordMem });
    cachedProductCatalog = data.productCatalog || [];
  }catch(e){
    productCatalogError = e.message || 'تعذر الاتصال بالخادم';
  }
  productCatalogLoading = false;
  render();
}

/* ---- admin login gate — password verified server-side (see adminPasswordGate) ---- */
let adminAuthed = false;

function renderAdminLogin(){
  return `<div class="card" style="max-width:360px;margin:40px auto">
    <h3>دخول لوحة التحكم</h3>
    <label>كلمة المرور</label>
    <input type="password" id="adm_pass">
    <button class="btn" id="adm_login_btn" style="margin-top:14px;width:100%">دخول</button>
  </div>`;
}

function render(){
  if(!repAuthed && !guestMode && currentView!=='admin'){ app.innerHTML = renderRepLogin(); wire(); return; }
  if(guestMode && !guestRegistered && currentView!=='admin'){ app.innerHTML = renderGuestRegister(); wire(); return; }
  if(currentView==='calc') app.innerHTML = renderCalc();
  else if(currentView==='feas') app.innerHTML = renderFeas();
  else if(currentView==='products') app.innerHTML = renderProducts();
  else if(currentView==='admin' && !adminAuthed) app.innerHTML = renderAdminLogin();
  else app.innerHTML = renderAdmin();
  wire();
}

function wire(){
  if(!repAuthed && !guestMode && currentView!=='admin'){
    document.getElementById('rep_login_btn').onclick = async ()=>{
      const username = document.getElementById('rep_user').value.trim();
      const password = document.getElementById('rep_pass').value;
      const errBox = document.getElementById('rep_login_err');
      try{
        const data = await callEngine('rep-login', { username, password });
        repUsername = username; repPasswordMem = password; repDisplayName = data.displayName; repAuthed = true;
        sessionStorage.setItem('holoul_rep_session', JSON.stringify({username, password, displayName:data.displayName}));
        showRepBadge();
        refresh();
      }catch(e){
        errBox.textContent = e.message || 'بيانات الدخول غير صحيحة';
        errBox.style.display = 'block';
      }
    };
    document.getElementById('guestModeBtn').onclick = ()=>{
      guestMode = true;
      render();
    };
    return;
  }
  if(guestMode && !guestRegistered && currentView!=='admin'){

      const name = document.getElementById('guest_name').value.trim();

  }

    const unlockBtn = document.getElementById('unlockDiscount');
    if(unlockBtn) unlockBtn.onclick = ()=>adminPasswordGate(()=>{ discountUnlocked=true; refresh(); });
    document.querySelectorAll('[data-tgl]').forEach(c=>c.onchange=()=>{state.toggles[c.dataset.tgl]=c.checked; refresh();});
    document.querySelectorAll('[data-preset]').forEach(b=>b.onclick=()=>{

        state.toggles = {panel:true, inverter:true, ip65:false, combiner:true, cables:true, mc4:true,
                          structure:false, concrete:false, earth:false, reactor:false, civilworks:false, elecworks:false, supply:false};
      } else {
        state.toggles = {panel:true, inverter:true, ip65:true, combiner:true, cables:true, mc4:true,
                          structure:true, concrete:true, earth:false, reactor:false, civilworks:true, elecworks:true, supply:true};

  if(currentView==='admin'){
    document.getElementById('addRepBtn').onclick = async ()=>{

      try{
        await callEngine('admin-save-rep', { adminPassword: adminPasswordMem, username, displayName, password, active:true });

        adminReps = repsData.reps || [];
        render();

    };
    document.getElementById('saveRepsBtn').onclick = async ()=>{
      const rows = {};
      document.querySelectorAll('[data-repid]').forEach(inp=>{

      });
      try{
        for(const id of Object.keys(rows)){
          const r = rows[id];
          const payload = { adminPassword: adminPasswordMem, id:+id, username:r.username, displayName:r.displayName, active:r.active };
          if(r.password) payload.password = r.password;
          await callEngine('admin-save-rep', payload);

        const repsData = await callEngine('admin-list-reps', { adminPassword: adminPasswordMem });

        render();
      }catch(e){ alert('تعذر الحفظ: '+e.message); }
    };
    document.querySelectorAll('[data-delrep]').forEach(b=>b.onclick=async ()=>{
      if(!confirm('حذف هذا المندوب نهائيًا؟')) return;
      try{
        await callEngine('admin-delete-rep', { adminPassword: adminPasswordMem, id:+b.dataset.delrep });
        const repsData = await callEngine('admin-list-reps', { adminPassword: adminPasswordMem });
        adminReps = repsData.reps || [];
        render();
      }catch(e){ alert('تعذر الحذف: '+e.message); }
    });
    function harvestAdminInputs(){
      document.querySelectorAll('[data-p]').forEach(inp=>{
        const i=+inp.dataset.p, f=inp.dataset.f;
        adminConfig.panels[i][f] = (f==='brand') ? inp.value : +inp.value;
      });
      document.querySelectorAll('[data-pvis]').forEach(inp=>{
        adminConfig.panels[+inp.dataset.pvis].visible = inp.checked;
      });
      document.querySelectorAll('[data-brand]:not([data-tier])').forEach(inp=>{
        adminConfig.inverterBrands[+inp.dataset.brand].brand = inp.value;
      });
      const tierRows = {};
      document.querySelectorAll('[data-tier]').forEach(inp=>{
        const bi=+inp.dataset.brand, ti=+inp.dataset.tier, f=inp.dataset.f;
        tierRows[bi] = tierRows[bi] || {};
        tierRows[bi][ti] = tierRows[bi][ti] || {};
        tierRows[bi][ti][f] = +inp.value;
      });
      Object.keys(tierRows).forEach(bi=>{
        Object.keys(tierRows[bi]).forEach(ti=>{
          const r = tierRows[bi][ti];
          const cost = r.list * (1 - (r.disc||0)/100);
          adminConfig.inverterBrands[+bi].tiers[+ti] = [r.kw, +cost.toFixed(2), r.list];
        });
      });
      delete adminConfig.inverters;
      document.querySelectorAll('[data-pcat]').forEach(inp=>{
        adminConfig.productCatalog[+inp.dataset.pcat].category = inp.value;
      });
      document.querySelectorAll('[data-pinfo]').forEach(inp=>{
        adminConfig.productCatalog[+inp.dataset.pinfo].categoryInfo = inp.value;
      });
      document.querySelectorAll('[data-pcol]').forEach(inp=>{
        const [ci,coli] = inp.dataset.pcol.split(':').map(Number);
        adminConfig.productCatalog[ci].columns[coli] = inp.value;
      });
      document.querySelectorAll('[data-pcell]').forEach(inp=>{
        const [ci,ri,coli] = inp.dataset.pcell.split(':').map(Number);
        adminConfig.productCatalog[ci].rows[ri][coli] = inp.value;
      });
      document.querySelectorAll('[data-d]').forEach(inp=>{
        const i=+inp.dataset.d, f=inp.dataset.f;
        adminConfig.discountTiers[i][f] = (f==='label') ? inp.value : +inp.value;
      });
      const num = id => { const el=document.getElementById(id); return el ? +el.value : undefined; };
      const setIfNum = (key,id) => { const v=num(id); if(v!==undefined && !isNaN(v)) adminConfig[key]=v; };
      setIfNum('hpCapacityRatio','a_hpratio');
      setIfNum('steelPanelPerHP','a_steel');
      setIfNum('cablePerMeter','a_cable');
      setIfNum('cableHighMultiplier','a_cablehigh');
      setIfNum('cableLowMultiplier','a_cablelow');
      setIfNum('cableMarkup','a_cablemarkup');
      setIfNum('combinerHeadroom','a_combheadroom');
      setIfNum('combinerMinSpareStrings','a_combspare');
      setIfNum('mc4PerUnit','a_mc4');
      setIfNum('structurePriceFixed','a_stfix');
      setIfNum('structurePriceRotational','a_strot');
      setIfNum('concretePerUnit','a_conc');
      setIfNum('earthingPerUnit','a_earth');
      setIfNum('flexTubePerUnit','a_flex');
      setIfNum('mechInstallPerPanel','a_mechinst');
      setIfNum('elecInstallPerPanel','a_elecinst');
      setIfNum('transportPerTrip','a_trans');
      setIfNum('transportMinimum','a_transmin');
      setIfNum('vat','a_vat');
      setIfNum('defaultDiscountIdx','a_defdisc');
      const webhookEl = document.getElementById('a_webhook');
      if(webhookEl) adminConfig.leadsWebhookUrl = webhookEl.value.trim();
    }

    document.getElementById('admSave').onclick = async ()=>{
      harvestAdminInputs();
      try{
        await callEngine('update-config', { adminPassword: adminPasswordMem, config: adminConfig });
        alert('تم حفظ التعديلات ✔');
        await refreshQuote();
      }catch(e){ alert('تعذر الحفظ: '+e.message); }
      render();
    };
    document.getElementById('leadsClear').onclick = ()=>{
      if(confirm('مسح كل طلبات العملاء المسجلة محليًا؟ (لن يؤثر على بيانات Google Sheet)')){ localStorage.removeItem(LEADS_KEY); render(); }
    };
    document.getElementById('leadsRefresh').onclick = ()=>loadCloudLeads();
    if(adminConfig.leadsWebhookUrl) loadCloudLeads();
    document.getElementById('adm_changecred').onclick = async ()=>{
      const np=document.getElementById('adm_newpass').value;
      if(!np){ alert('اكتب كلمة مرور جديدة أولاً'); return; }
      try{
        await callEngine('change-admin-password', { currentPassword: adminPasswordMem, newPassword: np });
        adminPasswordMem = np;
        alert('تم تحديث كلمة المرور ✔');
      }catch(e){ alert('تعذر التحديث: '+e.message); }
      render();
    };
    document.getElementById('adm_logout').onclick = ()=>{

      document.querySelector('[data-view="calc"]').classList.add('active');
      render();
    };
    document.getElementById('addPanel').onclick = ()=>{
      harvestAdminInputs();
      adminConfig.panels.push({brand:'جديد',power:600,vimp:40,voc:48,iimp:15,isc:16,priceW:0.5,visible:true});
      render();
    };
    document.querySelectorAll('[data-delpanel]').forEach(b=>b.onclick=()=>{
      harvestAdminInputs();
      adminConfig.panels.splice(+b.dataset.delpanel,1); render();
    });
    document.getElementById('addInverterBrand').onclick = ()=>{
      harvestAdminInputs();
      adminConfig.inverterBrands.push({brand:'نوع جديد', tiers:[[10,900,1000]]});
      render();
    };
    document.querySelectorAll('[data-delbrand]').forEach(b=>b.onclick=()=>{
      harvestAdminInputs();
      adminConfig.inverterBrands.splice(+b.dataset.delbrand,1); render();
    });
    document.querySelectorAll('[data-addtier]').forEach(b=>b.onclick=()=>{
      harvestAdminInputs();
      adminConfig.inverterBrands[+b.dataset.addtier].tiers.push([10,900,1000]);
      render();
    });
    document.querySelectorAll('[data-deltier]').forEach(b=>b.onclick=()=>{
      harvestAdminInputs();
      const [bi,ti] = b.dataset.deltier.split(':').map(Number);
      adminConfig.inverterBrands[bi].tiers.splice(ti,1);
      render();
    });
    document.getElementById('addProductCategory').onclick = ()=>{
      harvestAdminInputs();
      adminConfig.productCatalog.push({category:'فئة جديدة', columns:['الصنف','السعر'], rows:[]});
      render();
    };
    document.getElementById('bulkPriceApply').onclick = ()=>{
      const pct = +document.getElementById('bulkPricePct').value || 0;
      if(!pct){ alert('اكتب نسبة صحيحة'); return; }
      if(!confirm(`هيتم زيادة كل الأسعار في كل الفئات بنسبة ${pct}%. متأكد؟`)) return;
      harvestAdminInputs();
      adminConfig.productCatalog.forEach(cat=>{
        const priceCols = cat.columns.map((c,i)=>c.includes('السعر')?i:-1).filter(i=>i>=0);
        cat.rows.forEach(row=>{
          priceCols.forEach(ci=>{
            const num = parseFloat(String(row[ci]).replace(/[^\d.]/g,''));
            if(!isNaN(num)){
              const updated = num * (1 + pct/100);
              row[ci] = Number.isInteger(num) && Number.isInteger(updated) ? String(Math.round(updated)) : updated.toFixed(2);
            }
          });
        });
      });
      render();
      alert('تم تحديث الأسعار في الجدول — راجعها واضغط "حفظ التعديلات" لتثبيتها.');
    };
    document.querySelectorAll('[data-delcat]').forEach(b=>b.onclick=()=>{

      adminConfig.productCatalog.splice(+b.dataset.delcat,1); render();

      harvestAdminInputs();
      const cat = adminConfig.productCatalog[+b.dataset.addrow];
      cat.rows.push(new Array(cat.columns.length).fill(''));
      render();
    });
    document.querySelectorAll('[data-addcol]').forEach(b=>b.onclick=()=>{
      harvestAdminInputs();
      const cat = adminConfig.productCatalog[+b.dataset.addcol];
      cat.columns.push('عمود جديد');
      cat.rows.forEach(r=>r.push(''));
      render();
    });
    document.querySelectorAll('[data-delrow]').forEach(b=>b.onclick=()=>{
      harvestAdminInputs();
      const [ci,ri] = b.dataset.delrow.split(':').map(Number);
      adminConfig.productCatalog[ci].rows.splice(ri,1);
      render();
    });

    function readFileAsBase64(file){
      return new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = ()=>resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    async function uploadImage(file){
      const imageBase64 = await readFileAsBase64(file);
      const data = await callEngine('upload-product-image', { adminPassword: adminPasswordMem, imageBase64, filename: file.name });
      return data.url;
    }
    document.querySelectorAll('[data-catimg]').forEach(inp=>inp.onchange = async ()=>{
      const file = inp.files[0]; if(!file) return;
      harvestAdminInputs();
      try{
        const url = await uploadImage(file);
        adminConfig.productCatalog[+inp.dataset.catimg].categoryImage = url;
        render();
      }catch(e){ alert('تعذر رفع الصورة: '+e.message); }
    });

    document.querySelectorAll('[data-editdetail]').forEach(b=>b.onclick=()=>{
      const [ci,ri] = b.dataset.editdetail.split(':').map(Number);
      const cat = adminConfig.productCatalog[ci];
      const detail = (cat.productDetails && cat.productDetails[ri]) || {};
      document.getElementById('pde_target').value = `${ci}:${ri}`;
      document.getElementById('pde_description').value = detail.description || '';
      document.getElementById('pde_specs').value = Object.entries(detail.specs||{}).map(([k,v])=>`${k}: ${v}`).join('\n');
      const preview = document.getElementById('pde_imgpreview');
      delete preview.dataset.uploadedUrl;
      if(detail.image){ preview.src = detail.image; preview.style.display='inline-block'; } else { preview.style.display='none'; preview.src=''; }
      document.getElementById('productDetailEditor').style.display = 'block';
      const editorEl = document.getElementById('productDetailEditor');
      if(editorEl.scrollIntoView){ try{ editorEl.scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){} }
    });
    document.getElementById('pde_imgfile').onchange = async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      try{
        const url = await uploadImage(file);
        const preview = document.getElementById('pde_imgpreview');
        preview.src = url; preview.style.display='inline-block';
        preview.dataset.uploadedUrl = url;
      }catch(err){ alert('تعذر رفع الصورة: '+err.message); }
    };
    document.getElementById('pde_apply').onclick = ()=>{
      harvestAdminInputs();
      const [ci,ri] = document.getElementById('pde_target').value.split(':').map(Number);
      const cat = adminConfig.productCatalog[ci];
      cat.productDetails = cat.productDetails || {};
      const specs = {};
      document.getElementById('pde_specs').value.split('\n').forEach(line=>{
        const idx = line.indexOf(':');
        if(idx>0){ specs[line.slice(0,idx).trim()] = line.slice(idx+1).trim(); }
      });
      const preview = document.getElementById('pde_imgpreview');
      cat.productDetails[ri] = {
        image: preview.dataset.uploadedUrl || (preview.style.display!=='none' ? preview.src : (cat.productDetails[ri]||{}).image) || '',
        description: document.getElementById('pde_description').value,
        specs
      };
      document.getElementById('productDetailEditor').style.display = 'none';
      render();
    };
    document.getElementById('pde_cancel').onclick = ()=>{
      document.getElementById('productDetailEditor').style.display = 'none';
    };
    document.getElementById('admExport').onclick = ()=>{
      const blob = new Blob([JSON.stringify(adminConfig,null,2)],{type:'application/json'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='holoul-pricing-data.json'; a.click();
    };
    document.getElementById('admImportBtn').onclick = ()=>document.getElementById('admImport').click();
    document.getElementById('admImport').onchange = e=>{
      const file=e.target.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload = ()=>{
        try{ adminConfig = normalizeAdminConfig(JSON.parse(reader.result)); render(); alert('تم الاستيراد — اضغط "حفظ التعديلات" لتثبيته على الخادم ✔'); }
        catch(err){ alert('ملف غير صالح'); }
      };
      reader.readAsText(file);
    };
  }
}

    render();
  };
});

function showRepBadge(){
  const badge = document.getElementById('repNameBadge');
  const logoutBtn = document.getElementById('repLogoutBtn');
  const productsBtn = document.getElementById('productsNavBtn');
  if(productsBtn) productsBtn.style.display = guestMode ? 'none' : '';
  if(repAuthed && repDisplayName){
    badge.textContent = '👤 ' + repDisplayName;
    badge.style.display = 'inline';
    logoutBtn.style.display = 'inline-block';
  } else if(guestMode){
    badge.textContent = '🖥️ تسعير مباشر (بدون مندوب)';
    badge.style.display = 'inline';
    logoutBtn.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
    logoutBtn.style.display = 'none';
  }
}
document.getElementById('repLogoutBtn').onclick = ()=>{
  repAuthed = false; repUsername = null; repPasswordMem = null; repDisplayName = null;
  guestMode = false; guestRegistered = false;
  sessionStorage.removeItem('holoul_rep_session');
  state.client = ''; state.clientPhone = '';
  showRepBadge();
  render();
};
showRepBadge();

async function refresh(){
  quoteLoading = true;
  render();
  await refreshQuote();
  quoteLoading = false;
  render();
}
refresh();
</script>
